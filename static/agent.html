<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>澳洲肤润康 客服工作台</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f4f6fb;
        color: #172033;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        overflow: hidden;
      }

      button {
        font-family: inherit;
      }

      /* ---------- 登录页 ---------- */
      #login-view {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .login-card {
        width: 340px;
        background: #fff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 10px 40px rgba(20, 30, 60, 0.12);
      }

      .login-card h2 {
        margin: 0 0 20px;
        text-align: center;
        color: #2f6fed;
      }

      .login-card input {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 12px;
        border: 1px solid #d7dfec;
        border-radius: 10px;
        font-size: 15px;
        outline: none;
      }

      .login-card input:focus {
        border-color: #2f6fed;
      }

      .login-card button {
        width: 100%;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        background: #2f6fed;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }

      .login-error {
        color: #e0433d;
        font-size: 13px;
        margin-top: 8px;
        min-height: 18px;
        text-align: center;
      }

      /* ---------- 主体：整体骨架 ---------- */
      #main-view {
        display: none;
        height: 100vh;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        background: linear-gradient(135deg, #2f6fed, #25b8a8);
        color: #fff;
        flex-shrink: 0;
      }

      .topbar h1 {
        margin: 0;
        font-size: 18px;
      }

      .topbar .who {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 13px;
      }

      .topbar button {
        border: 0;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        padding: 7px 13px;
        border-radius: 9px;
        cursor: pointer;
        font-size: 13px;
      }

      .topbar button:hover {
        background: rgba(255, 255, 255, 0.32);
      }

      .mode-switch {
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.16);
        padding: 3px;
        border-radius: 10px;
      }

      .mode-switch-btn {
        border: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.85);
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
      }

      .mode-switch-btn:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      .mode-switch-btn.active {
        background: #fff;
        color: #2f6fed;
        font-weight: 700;
      }

      .mode-switch-readonly {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.92);
        background: rgba(255, 255, 255, 0.16);
        padding: 7px 13px;
        border-radius: 10px;
      }

      .conn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
        background: #ffb020;
      }

      .conn-dot.online {
        background: #2ecc71;
      }

      .app-layout {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      /* ---------- 左侧：会话列表 ---------- */
      .sidebar {
        width: 360px;
        min-width: 280px;
        background: #fff;
        border-right: 1px solid #e6eaf2;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .filter-tabs {
        display: flex;
        gap: 6px;
        padding: 12px 16px 0;
      }

      .filter-tab {
        flex: 1;
        text-align: center;
        padding: 7px 4px;
        font-size: 12px;
        color: #6b7686;
        border-radius: 8px;
        cursor: pointer;
        background: #f4f6fb;
      }

      .filter-tab.active {
        background: #2f6fed;
        color: #fff;
      }

      .conv-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0 8px;
      }

      .conv-empty {
        text-align: center;
        color: #94a1b8;
        padding: 40px 16px;
        font-size: 13px;
      }

      .conv-item {
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid #f4f6fb;
      }

      .conv-item:hover {
        background: #f7f9fd;
      }

      .conv-item.active {
        background: #eef3ff;
      }

      .conv-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #cfd8ea;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
        padding: 0 2px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(20, 30, 60, 0.12);
      }

      .conv-avatar.pending {
        background: linear-gradient(135deg, #ffb020, #ff8a3d);
      }

      .conv-avatar.claimed {
        background: linear-gradient(135deg, #2f6fed, #5b8cff);
      }

      .conv-avatar.answered {
        background: linear-gradient(135deg, #25b8a8, #1a7d3a);
      }

      .conv-main {
        flex: 1;
        min-width: 0;
      }

      .conv-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 6px;
        margin-bottom: 3px;
      }

      .conv-id {
        font-size: 13px;
        font-weight: 700;
        color: #172033;
      }

      .conv-time {
        font-size: 11px;
        color: #a5aebd;
        flex-shrink: 0;
      }

      .conv-question {
        font-size: 13px;
        color: #5c6579;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 5px;
      }

      .conv-badges {
        display: flex;
        gap: 5px;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10.5px;
        white-space: nowrap;
      }

      .badge.auto {
        background: #e6f4ea;
        color: #1a7d3a;
      }

      .badge.manual {
        background: #fdeaea;
        color: #c0392b;
      }

      .badge.collab {
        background: #eaf1ff;
        color: #2f6fed;
      }

      .badge.pending {
        background: #fff4e0;
        color: #b8860b;
      }

      .badge.claimed {
        background: #eaf1ff;
        color: #2f6fed;
      }

      .badge.answered {
        background: #eafaf0;
        color: #1a7d3a;
      }

      .badge.neutral {
        background: #eef1f7;
        color: #5c6579;
      }

      /* ---------- 右侧：会话详情（聊天窗） ---------- */
      .thread {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #eef1f8;
      }

      .thread-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a5aebd;
        font-size: 14px;
      }

      .thread-header {
        padding: 14px 26px;
        background: #fff;
        border-bottom: 1px solid #e6eaf2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .thread-header .title {
        font-size: 15px;
        font-weight: 700;
      }

      .thread-header .sub {
        font-size: 12px;
        color: #94a1b8;
        margin-top: 2px;
      }

      .thread-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 30px;
      }

      .bubble-row {
        display: flex;
        margin-bottom: 6px;
        gap: 10px;
        align-items: flex-start;
      }

      .bubble-row.customer {
        justify-content: flex-start;
      }

      .bubble-row.agent {
        justify-content: flex-end;
      }

      .bubble-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        box-shadow: 0 2px 6px rgba(20, 30, 60, 0.14);
        border: 2px solid #fff;
      }

      .bubble-avatar.customer {
        background: linear-gradient(135deg, #9aa5bd, #6b7690);
      }

      .bubble-avatar.agent {
        background: linear-gradient(135deg, #2f6fed, #25b8a8);
      }

      .bubble {
        max-width: 62%;
        padding: 12px 15px;
        border-radius: 14px;
        line-height: 1.65;
        font-size: 14px;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: 0 1px 4px rgba(20, 30, 60, 0.06);
      }

      .bubble.customer {
        background: #fff;
        border: 1px solid #e6eaf2;
        border-top-left-radius: 4px;
      }

      .bubble.agent {
        background: linear-gradient(135deg, #2f6fed, #4a80f0);
        color: #fff;
        border-top-right-radius: 4px;
      }

      .bubble-block {
        margin-bottom: 14px;
      }

      .bubble-block + .bubble-block {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed #e6eaf2;
      }

      .intent-wrap {
        margin: 6px 0 0 42px;
        max-width: 66%;
      }

      .intent-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 11px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .intent-badge.hit {
        background: #eef4ff;
        color: #2f6fed;
      }

      .intent-badge.miss {
        background: #fff4e0;
        color: #b8860b;
      }

      .intent-card {
        background: #fff;
        border: 1px solid #e6eaf2;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        color: #4a5468;
        line-height: 1.6;
      }

      .intent-card .q {
        font-weight: 700;
        color: #172033;
        margin-bottom: 4px;
      }

      .draft-wrap {
        margin: 6px 0 0 42px;
        max-width: 66%;
      }

      .draft-label {
        font-size: 12px;
        color: #22705f;
        font-weight: 700;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .draft-box {
        background: #f0f7f5;
        border: 1.5px dashed #25b8a8;
        border-radius: 12px;
        padding: 10px 12px;
      }

      .draft-box textarea {
        width: 100%;
        min-height: 70px;
        border: 0;
        background: transparent;
        resize: vertical;
        font: inherit;
        font-size: 14px;
        color: #22705f;
        outline: none;
      }

      .countdown-note {
        margin: 6px 0 0 42px;
        max-width: 66%;
        background: #fff6e8;
        border: 1px solid #f3c46a;
        color: #a3660b;
        font-size: 13px;
        border-radius: 10px;
        padding: 7px 12px;
      }

      .countdown-note .countdown-secs {
        font-weight: 700;
        color: #d3790a;
      }

      .countdown-note.countdown-urgent {
        background: #fdeaea;
        border-color: #ef9a9a;
        color: #c62828;
      }

      .countdown-note.countdown-urgent .countdown-secs {
        color: #c62828;
      }

      .msg-meta {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #a5aebd;
        margin: 0 0 4px 42px;
        max-width: 66%;
      }

      .compose-area {
        margin: 6px 0 0 42px;
        max-width: 66%;
        background: #fff;
        border: 1px solid #e6eaf2;
        border-radius: 12px;
        padding: 12px 14px;
      }

      .compose-area textarea {
        width: 100%;
        min-height: 64px;
        border: 1px solid #d7dfec;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        font-size: 14px;
        resize: vertical;
        margin-bottom: 10px;
        outline: none;
      }

      .compose-area textarea:focus {
        border-color: #2f6fed;
      }

      .compose-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .compose-warn {
        background: #fff7ea;
        border: 1px dashed #ffb020;
        border-radius: 10px;
        padding: 8px 12px;
        color: #8a6d1a;
        font-size: 12px;
        margin-bottom: 10px;
      }

      .btn {
        border: 0;
        padding: 9px 18px;
        border-radius: 9px;
        font-size: 13px;
        cursor: pointer;
      }

      .btn-primary {
        background: #2f6fed;
        color: #fff;
      }

      .btn-secondary {
        background: #eef1f7;
        color: #445;
      }

      .btn-danger {
        background: #fdeaea;
        color: #c0392b;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ---------- 管理员：模式与账号 抽屉 ---------- */
      .drawer-mask {
        position: fixed;
        inset: 0;
        background: rgba(10, 15, 30, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 998;
      }

      .drawer-mask.show {
        display: flex;
      }

      .drawer {
        width: 480px;
        max-height: 82vh;
        overflow-y: auto;
        background: #fff;
        border-radius: 16px;
        padding: 24px 26px;
      }

      .drawer h3 {
        margin: 0 0 16px;
        font-size: 16px;
      }

      .drawer h4 {
        margin: 22px 0 12px;
        font-size: 14px;
        color: #445;
      }

      .drawer-close {
        float: right;
        border: 0;
        background: #f4f6fb;
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 13px;
      }

      .agents-list {
        list-style: none;
        padding: 0;
        margin: 0 0 14px;
        font-size: 13px;
      }

      .agents-list li {
        padding: 6px 0;
        border-bottom: 1px solid #f0f2f7;
        display: flex;
        justify-content: space-between;
      }

      .create-agent-form {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .create-agent-form input,
      .create-agent-form select {
        flex: 1;
        min-width: 110px;
        padding: 9px 10px;
        border: 1px solid #d7dfec;
        border-radius: 8px;
        font-size: 13px;
      }

      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #172033;
        color: #fff;
        padding: 12px 18px;
        border-radius: 10px;
        font-size: 13px;
        opacity: 0;
        transform: translateY(-10px);
        transition: opacity 0.2s, transform 0.2s;
        z-index: 999;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="login-view">
      <div class="login-card">
        <h2>客服工作台登录</h2>
        <input id="login-username" type="text" placeholder="用户名" autocomplete="username" />
        <input id="login-password" type="password" placeholder="密码" autocomplete="current-password" />
        <button id="login-btn">登录</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>

    <div id="main-view">
      <div class="topbar">
        <h1>澳洲肤润康 客服工作台</h1>
        <div class="who">
          <span><span class="conn-dot" id="conn-dot"></span><span id="conn-text">连接中...</span></span>
          <div class="mode-switch" id="mode-switch"></div>
          <span id="who-name"></span>
          <button id="settings-btn">工作台设置</button>
          <button id="logout-btn">退出登录</button>
        </div>
      </div>

      <div class="app-layout">
        <div class="sidebar">
          <div class="filter-tabs" id="filter-tabs">
            <div class="filter-tab active" data-filter="all">全部</div>
            <div class="filter-tab" data-filter="pending">待处理</div>
            <div class="filter-tab" data-filter="claimed">已认领</div>
            <div class="filter-tab" data-filter="answered">已回复</div>
          </div>
          <div class="conv-list" id="conv-list"></div>
        </div>

        <div class="thread" id="thread">
          <div class="thread-empty" id="thread-empty">从左侧选择一条对话，查看题库检索标注与回复详情</div>
        </div>
      </div>
    </div>

    <div class="drawer-mask" id="drawer-mask">
      <div class="drawer">
        <button class="drawer-close" id="drawer-close">关闭</button>
        <h3>工作台设置</h3>

        <div id="admin-timeout-section" style="display: none;">
          <h4>人机协同：AI 建议自动发送</h4>
          <p style="font-size: 12px; color: #94a1b8; margin: 0 0 10px; line-height: 1.6;">
            人机协同模式下，如果客服在以下秒数内还没有认领处理，系统会自动把 AI
            建议的回复直接发给客户，避免客户等待过久；一旦客服认领，则以客服的处理为准，不会再自动发送。
          </p>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input
              id="collab-timeout-input"
              type="number"
              min="1"
              max="300"
              style="width: 100px; padding: 9px 10px; border: 1px solid #d7dfec; border-radius: 8px; font-size: 13px;"
            />
            <span style="font-size: 13px; color: #6b7686;">秒</span>
            <button class="btn btn-primary" id="save-timeout-btn">保存</button>
          </div>
        </div>

        <div id="admin-agents-section" style="display: none;">
          <h4>客服账号管理（管理员）</h4>
          <ul class="agents-list" id="agents-list"></ul>
          <div class="create-agent-form">
            <input id="new-username" placeholder="用户名" />
            <input id="new-password" placeholder="密码" type="password" />
            <input id="new-displayname" placeholder="显示名称" />
            <select id="new-role">
              <option value="agent">客服</option>
              <option value="admin">管理员</option>
            </select>
            <button class="btn btn-primary" id="create-agent-btn">新增账号</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const TOKEN_KEY = "fuyunhon_agent_token";
      const AGENT_KEY = "fuyunhon_agent_info";

      const loginView = document.getElementById("login-view");
      const mainView = document.getElementById("main-view");
      const loginBtn = document.getElementById("login-btn");
      const loginError = document.getElementById("login-error");
      const logoutBtn = document.getElementById("logout-btn");
      const whoName = document.getElementById("who-name");
      const convList = document.getElementById("conv-list");
      const filterTabs = document.getElementById("filter-tabs");
      const threadEl = document.getElementById("thread");
      const modeSwitchEl = document.getElementById("mode-switch");
      const settingsBtn = document.getElementById("settings-btn");
      const drawerMask = document.getElementById("drawer-mask");
      const drawerClose = document.getElementById("drawer-close");
      const adminTimeoutSection = document.getElementById("admin-timeout-section");
      const collabTimeoutInput = document.getElementById("collab-timeout-input");
      const saveTimeoutBtn = document.getElementById("save-timeout-btn");
      const adminAgentsSection = document.getElementById("admin-agents-section");
      const agentsList = document.getElementById("agents-list");
      const toastEl = document.getElementById("toast");
      const connDot = document.getElementById("conn-dot");
      const connText = document.getElementById("conn-text");

      const MODE_META = {
        auto: { label: "全AI模式", desc: "AI 自动检索题库并直接回复，无需人工介入" },
        manual: { label: "全人工模式", desc: "所有问题进入队列，由客服手动回复" },
        collab: { label: "人机协同模式", desc: "AI 生成建议答案，客服审核后再发送" },
      };

      const STATUS_LABEL = { pending: "待处理", claimed: "已认领", answered: "已回复" };

      let currentAgent = null;
      let currentToken = null;
      let currentMode = "auto";
      let ws = null;

      let sessions = []; // 按用户（session_id）分组的会话摘要列表
      let selectedSessionId = null;
      let sessionMessages = []; // 当前打开会话的全部提问/回复，按时间顺序
      let activeFilter = "all";

      function showToast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), 2500);
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str == null ? "" : str;
        return div.innerHTML;
      }

      function authHeaders() {
        return { Authorization: `Bearer ${currentToken}`, "Content-Type": "application/json" };
      }

      async function apiFetch(url, options = {}) {
        const res = await fetch(url, {
          ...options,
          headers: { ...authHeaders(), ...(options.headers || {}) },
        });
        if (res.status === 401) {
          logout();
          throw new Error("登录已过期，请重新登录");
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.detail || "请求失败");
        }
        return data;
      }

      function persistSession(token, agent) {
        localStorage.setItem(TOKEN_KEY, token);
        localStorage.setItem(AGENT_KEY, JSON.stringify(agent));
      }

      function clearSession() {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(AGENT_KEY);
      }

      function logout() {
        clearSession();
        if (ws) ws.close();
        currentAgent = null;
        currentToken = null;
        selectedSessionId = null;
        sessions = [];
        sessionMessages = [];
        loginView.style.display = "flex";
        mainView.style.display = "none";
      }

      async function login(username, password) {
        const res = await fetch("/api/agent/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "登录失败");
        return data;
      }

      loginBtn.addEventListener("click", async () => {
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;
        loginError.textContent = "";
        if (!username || !password) {
          loginError.textContent = "请输入用户名和密码";
          return;
        }
        try {
          const data = await login(username, password);
          persistSession(data.token, data.agent);
          enterApp(data.token, data.agent);
        } catch (err) {
          loginError.textContent = err.message;
        }
      });

      document.getElementById("login-password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });

      logoutBtn.addEventListener("click", logout);

      settingsBtn.addEventListener("click", () => drawerMask.classList.add("show"));
      drawerClose.addEventListener("click", () => drawerMask.classList.remove("show"));
      drawerMask.addEventListener("click", (e) => {
        if (e.target === drawerMask) drawerMask.classList.remove("show");
      });

      function enterApp(token, agent) {
        currentToken = token;
        currentAgent = agent;
        loginView.style.display = "none";
        mainView.style.display = "flex";
        whoName.textContent = `🎧 ${agent.displayName}（${agent.role === "admin" ? "管理员" : "客服"}）`;
        adminAgentsSection.style.display = agent.role === "admin" ? "block" : "none";
        adminTimeoutSection.style.display = agent.role === "admin" ? "block" : "none";
        refreshMode();
        refreshSessions();
        if (agent.role === "admin") {
          refreshAgents();
          refreshCollabTimeout();
        }
        connectWebSocket(token);
      }

      // ---------------- 工作模式（右上角快捷切换） ----------------

      async function refreshMode() {
        const data = await apiFetch("/api/mode");
        currentMode = data.mode;
        renderModeSwitch();
      }

      function renderModeSwitch() {
        const isAdmin = currentAgent && currentAgent.role === "admin";

        if (!isAdmin) {
          modeSwitchEl.innerHTML = `<span class="mode-switch-readonly">当前模式：${MODE_META[currentMode]?.label || currentMode}</span>`;
          return;
        }

        modeSwitchEl.innerHTML = Object.entries(MODE_META)
          .map(([key, meta]) => {
            const active = key === currentMode ? "active" : "";
            return `<button class="mode-switch-btn ${active}" data-mode="${key}" title="${escapeHtml(meta.desc)}">${meta.label}</button>`;
          })
          .join("");

        modeSwitchEl.querySelectorAll(".mode-switch-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const mode = btn.getAttribute("data-mode");
            if (mode === currentMode) return;
            try {
              await apiFetch("/api/mode", { method: "POST", body: JSON.stringify({ mode }) });
              currentMode = mode;
              renderModeSwitch();
              showToast(`已切换为：${MODE_META[mode].label}`);
            } catch (err) {
              showToast(err.message);
            }
          });
        });
      }

      // ---------------- 人机协同：AI 建议自动发送超时 ----------------

      async function refreshCollabTimeout() {
        try {
          const data = await apiFetch("/api/collab-timeout");
          collabTimeoutInput.value = data.seconds;
        } catch (err) {
          // ignore
        }
      }

      saveTimeoutBtn.addEventListener("click", async () => {
        const seconds = Number(collabTimeoutInput.value);
        if (!seconds || seconds < 1 || seconds > 300) {
          showToast("请输入 1-300 之间的秒数");
          return;
        }
        try {
          await apiFetch("/api/collab-timeout", { method: "POST", body: JSON.stringify({ seconds }) });
          showToast("已保存自动发送时间设置");
        } catch (err) {
          showToast(err.message);
        }
      });

      // ---------------- 会话列表（按用户 session_id 分组，一个用户一个对话框） ----------------

      function avatarClassFor(session) {
        if (session.pending_count > 0) return "pending";
        if (session.claimed_count > 0) return "claimed";
        return "answered";
      }

      function visitorLabel(session) {
        return session.visitor_no ? `访客${session.visitor_no}` : "访客";
      }

      function avatarLabel(session) {
        return session.visitor_no ? String(session.visitor_no) : "?";
      }

      function sessionStatusBadge(session) {
        if (session.pending_count > 0) {
          return `<span class="badge pending">${session.pending_count} 条待处理</span>`;
        }
        if (session.claimed_count > 0) {
          return `<span class="badge claimed">处理中</span>`;
        }
        return `<span class="badge answered">已回复</span>`;
      }

      function matchesFilter(session) {
        if (activeFilter === "all") return true;
        if (activeFilter === "pending") return session.pending_count > 0;
        if (activeFilter === "claimed") return session.pending_count === 0 && session.claimed_count > 0;
        if (activeFilter === "answered") return session.pending_count === 0 && session.claimed_count === 0;
        return true;
      }

      function renderConvList() {
        const filtered = sessions.filter(matchesFilter);

        if (filtered.length === 0) {
          convList.innerHTML = `<div class="conv-empty">暂无对话记录</div>`;
          return;
        }

        convList.innerHTML = filtered
          .map((session) => {
            const active = session.session_id === selectedSessionId ? "active" : "";
            return `
              <div class="conv-item ${active}" data-session-id="${escapeHtml(session.session_id)}">
                <div class="conv-avatar ${avatarClassFor(session)}">${escapeHtml(avatarLabel(session))}</div>
                <div class="conv-main">
                  <div class="conv-top">
                    <span class="conv-id">${escapeHtml(visitorLabel(session))}</span>
                    <span class="conv-time">${session.last_activity || ""}</span>
                  </div>
                  <div class="conv-question">${escapeHtml(session.last_question || "")}</div>
                  <div class="conv-badges"><span class="badge neutral">共${session.message_count}条</span>${sessionStatusBadge(session)}</div>
                </div>
              </div>`;
          })
          .join("");

        convList.querySelectorAll(".conv-item").forEach((el) => {
          el.addEventListener("click", () => {
            selectSession(el.getAttribute("data-session-id"));
          });
        });
      }

      filterTabs.querySelectorAll(".filter-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          activeFilter = tab.getAttribute("data-filter");
          filterTabs.querySelectorAll(".filter-tab").forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          renderConvList();
        });
      });

      async function selectSession(sessionId) {
        selectedSessionId = sessionId;
        renderConvList();
        threadEl.innerHTML = `<div class="thread-empty">正在加载对话...</div>`;
        await loadSessionMessages(sessionId);
      }

      // ---------------- 会话详情（同一用户的完整聊天记录） ----------------

      function renderIntentBlock(item, missHint) {
        if (item.matched === 1) {
          const scoreText = typeof item.match_score === "number" ? `${(item.match_score * 100).toFixed(0)}%` : "-";
          return `
            <div class="intent-wrap">
              <span class="intent-badge hit">✨ AI 识别：命中题库问题（匹配度 ${scoreText}）</span>
              <div class="intent-card">
                <div class="q">${escapeHtml(item.matched_question || "")}</div>
                <div>${escapeHtml(item.matched_answer || "")}</div>
              </div>
            </div>`;
        }
        if (item.matched === 0) {
          return `
            <div class="intent-wrap">
              <span class="intent-badge miss">⚠️ AI 识别：未命中题库</span>
              <div class="intent-card">${missHint}</div>
            </div>`;
        }
        return "";
      }

      function renderMessageBlock(item) {
        const modeBadge = `<span class="badge ${item.mode_used}">${MODE_META[item.mode_used]?.label || item.mode_used}</span>`;
        const statusBadge = `<span class="badge ${item.status}">${STATUS_LABEL[item.status] || item.status}</span>`;

        let html = `
          <div class="bubble-block" data-msg-id="${item.id}">
            <div class="msg-meta">
              <span>#${item.id} · ${item.created_at || ""}</span>
              <span>${modeBadge}${statusBadge}</span>
            </div>
            <div class="bubble-row customer">
              <div class="bubble-avatar customer" title="客户">🧑</div>
              <div class="bubble customer">${escapeHtml(item.question)}</div>
            </div>
            ${renderIntentBlock(item, item.status === "answered" ? "题库中暂无对应说明。" : "题库中暂无对应说明，请客服根据实际情况人工回复，或补充题库后重新检索。")}`;

        const isMine = item.claimed_by === currentAgent.id;
        const isClaimedByOther = item.claimed_by && !isMine;

        if (item.status === "answered") {
          const autoSent = !item.answered_by && item.answered_by_name;
          html += `
            <div class="bubble-row agent">
              <div class="bubble agent">${escapeHtml(item.final_answer || "")}</div>
              <div class="bubble-avatar agent" title="${autoSent ? escapeHtml(item.answered_by_name) : "客服"}">${autoSent ? "🤖" : "🎧"}</div>
            </div>`;
        } else {
          if (item.ai_suggested_answer) {
            html += `
              <div class="draft-wrap">
                <div class="draft-label">💡 AI 建议回复（未发送，可编辑后再发送）</div>
                <div class="draft-box">${escapeHtml(item.ai_suggested_answer)}</div>
              </div>`;
          }
          if (item.status === "pending" && item.mode_used === "collab" && item.auto_send_at) {
            html += `
              <div class="countdown-note" data-deadline="${escapeHtml(item.auto_send_at)}">
                ⏳ 若无人认领，AI 建议将在 <span class="countdown-secs">--</span> 秒后自动发送给客户
              </div>`;
          }
          // 无论是否已认领、无论哪种模式，都始终提供输入框，客服随时可以直接回复客户
          html += composeAreaHtml(item, isMine, isClaimedByOther);
        }

        html += `</div>`;
        return html;
      }

      function renderThread() {
        const session = sessions.find((s) => s.session_id === selectedSessionId);
        if (!session) {
          threadEl.innerHTML = `<div class="thread-empty">从左侧选择一个用户，查看完整对话记录</div>`;
          return;
        }

        const header = `
          <div class="thread-header">
            <div>
              <div class="title">客户会话 · ${escapeHtml(visitorLabel(session))}</div>
              <div class="sub">共 ${session.message_count} 条提问 · 最近活跃 ${session.last_activity || ""}${session.client_ip ? ` · IP ${escapeHtml(session.client_ip)}` : ""}</div>
            </div>
          </div>`;

        const messagesHtml = sessionMessages.map(renderMessageBlock).join("");

        threadEl.innerHTML = `${header}<div class="thread-messages" id="thread-messages-scroll">${messagesHtml}</div>`;
        bindComposeActions();
        updateCountdowns();

        const scrollEl = document.getElementById("thread-messages-scroll");
        if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
      }

      function composeAreaHtml(item, isMine, isClaimedByOther) {
        // 不管当前是否已认领、认领人是谁，始终提供输入框：客服可以随时直接回复客户，
        // "认领"只是一个可选的协作提示（让其他客服知道有人在处理），不是回复的前提条件。
        const prefill = item.ai_suggested_answer || "";
        let warnHtml = "";
        let actionsHtml = "";

        if (isClaimedByOther) {
          warnHtml = `<div class="compose-warn">⚠️ 客服「${escapeHtml(item.claimed_by_name || "")}」正在处理该问题，如需回复请先与其确认，避免重复答复客户。</div>`;
          actionsHtml = `<button class="btn btn-primary" data-action="answer" data-id="${item.id}">发送回复</button>`;
        } else if (item.status === "claimed" && isMine) {
          actionsHtml = `
            <button class="btn btn-secondary" data-action="release" data-id="${item.id}">释放认领</button>
            <button class="btn btn-primary" data-action="answer" data-id="${item.id}">发送回复</button>`;
        } else {
          actionsHtml = `
            <button class="btn btn-secondary" data-action="claim" data-id="${item.id}">认领此问题</button>
            <button class="btn btn-primary" data-action="answer" data-id="${item.id}">发送回复</button>`;
        }

        return `
          <div class="compose-area">
            ${warnHtml}
            <textarea data-answer-input="${item.id}" placeholder="输入回复内容...">${escapeHtml(prefill)}</textarea>
            <div class="compose-actions">${actionsHtml}</div>
          </div>`;
      }

      function bindComposeActions() {
        threadEl.querySelectorAll("[data-action]").forEach((btn) => {
          const id = btn.getAttribute("data-id");
          const action = btn.getAttribute("data-action");
          btn.addEventListener("click", async () => {
            try {
              if (action === "claim") {
                await apiFetch(`/api/agent/claim/${id}`, { method: "POST" });
              } else if (action === "release") {
                await apiFetch(`/api/agent/release/${id}`, { method: "POST" });
              } else if (action === "answer") {
                const textarea = document.querySelector(`[data-answer-input="${id}"]`);
                const answer = textarea.value.trim();
                if (!answer) {
                  showToast("请输入回复内容");
                  return;
                }
                await apiFetch(`/api/agent/answer/${id}`, {
                  method: "POST",
                  body: JSON.stringify({ answer }),
                });
                showToast("回复已发送");
              }
              await refreshAll();
            } catch (err) {
              showToast(err.message);
            }
          });
        });
      }

      // ---------------- 数据拉取 ----------------

      async function refreshSessions() {
        try {
          const data = await apiFetch("/api/agent/sessions");
          sessions = data.items || [];
          renderConvList();
        } catch (err) {
          // 忽略瞬时错误，等待下一次轮询/推送
        }
      }

      async function loadSessionMessages(sessionId) {
        try {
          const data = await apiFetch(`/api/agent/sessions/${encodeURIComponent(sessionId)}`);
          sessionMessages = data.items || [];
          renderThread();
        } catch (err) {
          showToast(err.message);
        }
      }

      async function refreshAll() {
        await refreshSessions();
        if (selectedSessionId) await loadSessionMessages(selectedSessionId);
      }

      // ---------------- 管理员：客服账号 ----------------

      async function refreshAgents() {
        try {
          const data = await apiFetch("/api/agent/agents");
          agentsList.innerHTML = data.agents
            .map(
              (a) =>
                `<li><span>${escapeHtml(a.display_name)} (${escapeHtml(a.username)})</span><span>${a.role === "admin" ? "管理员" : "客服"}</span></li>`
            )
            .join("");
        } catch (err) {
          // ignore
        }
      }

      document.getElementById("create-agent-btn").addEventListener("click", async () => {
        const username = document.getElementById("new-username").value.trim();
        const password = document.getElementById("new-password").value;
        const displayName = document.getElementById("new-displayname").value.trim();
        const role = document.getElementById("new-role").value;
        if (!username || !password || !displayName) {
          showToast("请填写完整信息");
          return;
        }
        try {
          await apiFetch("/api/agent/agents", {
            method: "POST",
            body: JSON.stringify({ username, password, display_name: displayName, role }),
          });
          showToast("账号创建成功");
          document.getElementById("new-username").value = "";
          document.getElementById("new-password").value = "";
          document.getElementById("new-displayname").value = "";
          refreshAgents();
        } catch (err) {
          showToast(err.message);
        }
      });

      // ---------------- WebSocket 实时推送 ----------------

      function connectWebSocket(token) {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${protocol}://${location.host}/ws/agent?token=${encodeURIComponent(token)}`);

        ws.onopen = () => {
          connDot.classList.add("online");
          connText.textContent = "实时连接";
        };
        ws.onclose = () => {
          connDot.classList.remove("online");
          connText.textContent = "已断开，正在重连...";
          setTimeout(() => {
            if (currentToken) connectWebSocket(currentToken);
          }, 3000);
        };
        ws.onerror = () => {
          connDot.classList.remove("online");
        };
        ws.onmessage = () => {
          refreshAll();
        };
      }

      // 兜底轮询，防止 WebSocket 断连时列表不刷新
      setInterval(() => {
        if (currentToken) refreshAll();
      }, 5000);

      // ---------------- 人机协同倒计时（每秒刷新一次显示，不依赖整体重渲染） ----------------

      function updateCountdowns() {
        document.querySelectorAll(".countdown-note[data-deadline]").forEach((el) => {
          const deadline = new Date(el.getAttribute("data-deadline")).getTime();
          const secsEl = el.querySelector(".countdown-secs");
          if (!secsEl || Number.isNaN(deadline)) return;
          const remaining = Math.max(0, Math.round((deadline - Date.now()) / 1000));
          secsEl.textContent = remaining;
          el.classList.toggle("countdown-urgent", remaining <= 3);
        });
      }
      setInterval(updateCountdowns, 1000);

      // ---------------- 自动恢复登录态 ----------------

      (function restoreSession() {
        const token = localStorage.getItem(TOKEN_KEY);
        const agentRaw = localStorage.getItem(AGENT_KEY);
        if (token && agentRaw) {
          try {
            enterApp(token, JSON.parse(agentRaw));
          } catch (err) {
            clearSession();
          }
        }
      })();
    </script>
  </body>
</html>
