<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>澳洲肤润康 AI 客服</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        color: #172033;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      .page {
        /* 手机浏览器的地址栏/工具栏会动态伸缩，导致 100vh 计算不稳定，
           曾出现过页面被意外滚动、顶部标题被顶到可视区域外的问题（尤其点击输入框后）。
           用 position: fixed 把整个应用钉死在可视窗口内，不参与文档滚动，从根源上避免这个问题。
           iPhone（Safari/微信内置浏览器）弹出键盘时，只有"视觉视口"会缩小，用来定位 fixed 元素的
           "布局视口"并不会跟着变化——如果高度写死 100vh/inset:0，键盘弹出后整块应用还是按旧高度
           占位，导致输入框被顶到屏幕中间这种错位。改成用下面 JS 动态写入的 --app-height（等于
           window.visualViewport.height）来控制高度，键盘弹出/收起时会跟着实时调整，不再错位。 */
        position: fixed;
        top: var(--app-offset-top, 0px);
        left: 0;
        width: 100%;
        height: var(--app-height, 100vh);
        display: flex;
      }

      .chat {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #ffffff;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e8edf5;
        /* 配色跟随官网 https://www.fuyunhon.com/ 的品牌色（主色 #009c84 青绿、辅色 #23b8bc 青蓝），
           只换颜色，不改版面结构。 */
        background: linear-gradient(135deg, #009c84, #23b8bc);
        color: #ffffff;
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
      }

      .header p {
        margin: 8px 0 0;
        opacity: 0.9;
        font-size: 14px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .message {
        /* width: fit-content 让气泡宽度跟着文字内容走，短消息就是短气泡；
           max-width 只用来限制长消息不要撑得太宽，两者配合才不会出现"文字很短、气泡却很宽"的丑样子。 */
        width: fit-content;
        max-width: 78%;
        margin-bottom: 16px;
        padding: 13px 15px;
        border-radius: 16px;
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 15px;
      }

      .bot {
        background: #f0f4fa;
        border-top-left-radius: 4px;
      }

      /* 等待结果时用几个跳动的小圆点表示"还在处理中"，比纯静态文字更直观。 */
      .typing-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 6px;
        vertical-align: middle;
      }

      .typing-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7a8aa8;
        opacity: 0.35;
        animation: typing-bounce 1.1s infinite ease-in-out;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes typing-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        30% {
          transform: translateY(-4px);
          opacity: 0.9;
        }
      }

      .user {
        margin-left: auto;
        background: #009c84;
        color: #ffffff;
        border-top-right-radius: 4px;
      }

      /* 未命中转人工等太久时，让客户就地留下邮箱，方便客服后续通过邮件回复；
         客户不填邮箱就不提交，不会触发任何邮件。 */
      .email-capture {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .email-capture input {
        flex: 1;
        min-width: 160px;
        border: 1px solid #d7dfec;
        border-radius: 10px;
        padding: 9px 10px;
        font: inherit;
        /* 同下面 .transfer-question-input：不能低于 16px，否则 iOS Safari 聚焦时会自动放大整页。 */
        font-size: 16px;
        outline: none;
      }

      .email-capture input:focus {
        border-color: #009c84;
      }

      .email-capture button {
        width: auto;
        padding: 9px 16px;
        border-radius: 10px;
        font-size: 14px;
      }

      .email-capture-status {
        margin-top: 8px;
        font-size: 13px;
        color: #6b7686;
      }

      /* 客户主动说"转人工"后，需要客户补充说明具体想咨询的问题，跟留邮箱输入框共用同一套外观。 */
      .transfer-question-input {
        display: block;
        width: 100%;
        min-height: 60px;
        margin-top: 10px;
        border: 1px solid #d7dfec;
        border-radius: 10px;
        padding: 9px 10px;
        font: inherit;
        /* 不能低于 16px：iOS Safari 对 font-size < 16px 的输入框，聚焦时会自动放大整页，
           放大后不会自动还原，表现为"点了输入框/发送后页面显示不全、右边被挤出屏幕"。 */
        font-size: 16px;
        outline: none;
        resize: vertical;
        box-sizing: border-box;
      }

      .transfer-question-input:focus {
        border-color: #009c84;
      }

      /* 全人工模式下没有邮箱输入框，提交按钮直接跟在问题输入框下面，需要单独留一点上边距。 */
      .transfer-question-submit {
        margin-top: 10px;
      }

      .composer {
        display: flex;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid #e8edf5;
        background: #ffffff;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 48px;
        max-height: 140px;
        border: 1px solid #d7dfec;
        border-radius: 14px;
        padding: 13px 14px;
        outline: none;
        font: inherit;
      }

      textarea:focus {
        border-color: #009c84;
      }

      button {
        width: 104px;
        border: 0;
        border-radius: 14px;
        background: #009c84;
        color: #ffffff;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .product-indicator {
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.95;
      }

      .product-indicator a {
        color: #ffffff;
        text-decoration: underline;
        cursor: pointer;
      }

      .picker-overlay {
        position: fixed;
        inset: 0;
        background: rgba(20, 30, 60, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }

      .picker-card {
        background: #ffffff;
        border-radius: 18px;
        max-width: 380px;
        width: 100%;
        padding: 28px 26px;
        box-shadow: 0 20px 60px rgba(20, 30, 60, 0.25);
        text-align: center;
      }

      .picker-card h2 {
        margin: 0 0 8px;
        font-size: 19px;
        color: #172033;
      }

      .picker-card p {
        margin: 0 0 20px;
        font-size: 13px;
        color: #6b7686;
      }

      .picker-options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .picker-btn {
        width: 100%;
        border: 1.5px solid #d7dfec;
        background: #f7f9fd;
        color: #172033;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: border-color 0.15s, background 0.15s;
      }

      .picker-btn:hover {
        border-color: #009c84;
        background: #e3f5f1;
      }

      /* 手机窄屏适配：整体已是全屏聊天布局，这里只需收紧间距/字号，
         并把输入区改成"文本框在上、发送按钮独占一行"，避免小屏被挤变形。 */
      @media (max-width: 480px) {
        .header {
          padding: 14px 16px;
        }

        .header h1 {
          font-size: 18px;
        }

        .header p {
          font-size: 12.5px;
        }

        .product-indicator {
          font-size: 12px;
        }

        .messages {
          padding: 14px;
        }

        .message {
          max-width: 86%;
          font-size: 14px;
          padding: 11px 13px;
        }

        .composer {
          flex-wrap: wrap;
          padding: 10px 12px;
        }

        textarea {
          min-height: 42px;
          /* 不能低于 16px：iOS Safari 对 font-size < 16px 的输入框，点击聚焦时会自动把整页
             放大（想让文字看起来更大），放大后页面右侧内容就会被挤出可视区域、显示不全，
             而且这个放大状态往往不会自动还原——这正是"点击输入框/发送后页面显示不全"的成因。 */
          font-size: 16px;
          flex-basis: 100%;
        }

        button {
          width: 100%;
          padding: 10px 0;
        }

        .picker-card {
          padding: 20px 18px;
        }

        .picker-card h2 {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="chat">
        <header class="header">
          <h1>澳洲肤润康 AI 客服</h1>
          <p id="product-indicator" class="product-indicator" style="display: none">
            当前咨询：<span id="current-product-label"></span> · <a id="switch-product-link">切换产品</a>
          </p>
        </header>

        <div id="messages" class="messages">
          <div class="message bot">你好，我是澳洲肤润康 AI 客服。请先选择您要咨询的产品，我再根据对应题库为您解答。</div>
        </div>

        <form id="form" class="composer">
          <textarea id="input" placeholder="例如：孕妇能用吗？" rows="1"></textarea>
          <button id="send" type="submit">发送</button>
        </form>
      </section>
    </main>

    <div id="product-picker-overlay" class="picker-overlay">
      <div class="picker-card">
        <h2>请选择您想咨询的产品</h2>
        <p>选择后，我们会针对该产品的常见问题为您解答</p>
        <div id="picker-options" class="picker-options"></div>
      </div>
    </div>

    <script>
      // ---------------- iOS 键盘弹出时的视口修正 ----------------
      // Safari/微信内置浏览器弹出键盘后，只有 visualViewport（视觉视口）会变矮，
      // .page 用来定位的布局视口不会变——所以要靠 visualViewport 的实时高度去改写
      // --app-height，键盘弹出/收起时 .page 才会跟着同步收缩/恢复，不再把输入框顶飞到屏幕中间。
      // 键盘弹出时，部分机型/浏览器（如微信内置浏览器）还会把"视觉视口"相对布局视口向下滚动一段
      // 距离（用来在键盘上方露出地址栏），这段偏移量要同步写进 --app-offset-top，否则固定定位的
      // .page 仍按布局视口原点定位，会被顶到可视区域外面。
      function syncAppViewport() {
        const vv = window.visualViewport;
        const height = vv ? vv.height : window.innerHeight;
        const offsetTop = vv ? vv.offsetTop : 0;
        document.documentElement.style.setProperty("--app-height", `${height}px`);
        document.documentElement.style.setProperty("--app-offset-top", `${offsetTop}px`);
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncAppViewport);
        window.visualViewport.addEventListener("scroll", syncAppViewport);
      } else {
        window.addEventListener("resize", syncAppViewport);
      }
      syncAppViewport();

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const messages = document.getElementById("messages");
      const pickerOverlay = document.getElementById("product-picker-overlay");
      const pickerOptions = document.getElementById("picker-options");
      const productIndicator = document.getElementById("product-indicator");
      const currentProductLabel = document.getElementById("current-product-label");
      const switchProductLink = document.getElementById("switch-product-link");

      // 留邮箱 / 补充问题这两个入口共用同一套邮箱格式校验，只有真实格式的邮箱才会被接受。
      const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      // 用 sessionStorage（不是 localStorage）保存会话 id：sessionStorage 只在"当前标签页"存在，
      // 刷新页面（F5）不会清空，正好可以借它的这段生命周期恢复聊天记录；但客户把标签页叉掉/
      // 关闭浏览器后，sessionStorage 会被清空，下次再打开就是全新会话，不会继续沿用旧的历史记录。
      const SESSION_KEY = "fuyunhon_session_id";
      function getSessionId() {
        let id = sessionStorage.getItem(SESSION_KEY);
        if (!id) {
          id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
          sessionStorage.setItem(SESSION_KEY, id);
        }
        return id;
      }

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `message ${role}`;
        el.textContent = text;
        messages.appendChild(el);
        messages.scrollTop = messages.scrollHeight;
        return el;
      }

      // 跟 addMessage 的区别：新消息插在指定的 afterEl 后面，而不是无条件追加到整个聊天
      // 记录的最末尾。刷新页面一次性恢复多条历史对话时，各自的"稍后才出现"提示（比如
      // 等满 10 秒才出现的"人工客服正忙"）是通过 setTimeout 异步补上的——如果统一都用
      // addMessage 追加到末尾，等这些计时器几乎同时触发时，几条本该分别跟在各自那条提问
      // 下面的提示，就会全部堆在聊天记录最下面、跟自己所属的提问完全脱节，看起来次序很乱。
      // 用这个函数固定插在"这条对话自己最新的一条消息"后面，才能保证每个对话自己的几条
      // 消息始终连在一起，不会被其他对话的异步更新插队。
      function addMessageAfter(afterEl, text, role) {
        const el = document.createElement("div");
        el.className = `message ${role}`;
        el.textContent = text;
        if (afterEl && afterEl.parentNode === messages) {
          afterEl.insertAdjacentElement("afterend", el);
        } else {
          messages.appendChild(el);
        }
        messages.scrollTop = messages.scrollHeight;
        return el;
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str == null ? "" : str;
        return div.innerHTML;
      }

      const THINKING_DOTS_HTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';

      // 跳动小圆点只用来代替文末的 "..."：有省略号才显示动效；文末是 ～/~ 或普通句号时不加圆点。
      function setThinkingText(el, text) {
        const raw = text == null ? "" : String(text);
        if (/(?:\.{3}|…)+$/.test(raw)) {
          const base = raw.replace(/(?:\.{3}|…)+$/, "");
          el.innerHTML = escapeHtml(base) + THINKING_DOTS_HTML;
        } else {
          el.textContent = raw;
        }
        messages.scrollTop = messages.scrollHeight;
      }

      // 已经有确定结果（真正的回复，或彻底放弃等待）时用这个：纯文字，不再带动态点。
      function setFinalText(el, text) {
        el.textContent = text;
        messages.scrollTop = messages.scrollHeight;
      }

      // 未命中转人工等太久（10 秒）时，就地给客户一个留邮箱的入口：填了才提交，
      // 不填就什么都不会发生，不会触发任何邮件通知。
      function renderLeaveEmailPrompt(el, conversationId, question) {
        el.innerHTML = "";

        const textEl = document.createElement("div");
        textEl.textContent = "人工客服正忙，留下你的邮箱，客服稍后通过邮箱回复您";
        el.appendChild(textEl);

        const row = document.createElement("div");
        row.className = "email-capture";

        const emailInput = document.createElement("input");
        emailInput.type = "email";
        emailInput.placeholder = "请输入您的邮箱";

        const submitBtn = document.createElement("button");
        submitBtn.type = "button";
        submitBtn.textContent = "提交";

        row.appendChild(emailInput);
        row.appendChild(submitBtn);
        el.appendChild(row);

        const statusEl = document.createElement("div");
        statusEl.className = "email-capture-status";
        statusEl.style.display = "none";
        el.appendChild(statusEl);

        function showStatus(text) {
          statusEl.textContent = text;
          statusEl.style.display = "block";
          messages.scrollTop = messages.scrollHeight;
        }

        submitBtn.addEventListener("click", async () => {
          const email = emailInput.value.trim();
          if (!EMAIL_RE.test(email)) {
            showStatus("请输入正确的邮箱地址");
            return;
          }
          submitBtn.disabled = true;
          try {
            const res = await fetch(`/api/conversations/${conversationId}/leave-email`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });
            if (!res.ok) throw new Error();
            row.remove();
            statusEl.remove();
            // 客户填的邮箱、以及系统的确认，都各自单独成一条正常大小的消息保留下来，
            // 不再挤在"人工客服正忙"这条提示下面变成一行不起眼的小字。确认文案里要同时带上
            // 客户具体问的是什么、以及客服会用哪个邮箱回复，而不是一句不带内容的泛泛确认。
            addMessage(`📧 ${email}`, "user");
            const confirmText = question
              ? `已将您的问题「${question}」更新给人工客服，请耐心等待客服通过邮箱【${email}】回复您～`
              : `已将您的问题更新给人工客服，请耐心等待客服通过邮箱【${email}】回复您～`;
            addMessage(confirmText, "bot");
          } catch (err) {
            submitBtn.disabled = false;
            showStatus("提交失败，请稍后重试");
          }
        });

        messages.scrollTop = messages.scrollHeight;
      }

      // 客户直接说"转人工"之类明确要求转接真人："转人工"这几个字本身不是一句有实际内容的
      // 提问，客服光看这个不知道要处理什么，所以要请客户再描述一次具体想咨询的问题（必填）；
      // 邮箱选填，留下真实格式的邮箱后客服可以直接通过邮件回复，不填也不影响问题内容的更新。
      // 全人工模式下客服本就要一直盯着工作台处理每条对话，完全不需要留邮箱这套机制，
      // 所以 isManual=true 时只显示问题输入框，不渲染邮箱相关的这一整套 UI。
      function renderTransferQuestionPrompt(el, conversationId, isManual, mode) {
        el.innerHTML = "";

        const textEl = document.createElement("div");
        textEl.textContent = "好的，请您简单描述一下想咨询的具体问题，我们马上为您转接人工客服～";
        el.appendChild(textEl);

        const questionInput = document.createElement("textarea");
        questionInput.className = "transfer-question-input";
        questionInput.placeholder = "请输入您想咨询的问题";
        el.appendChild(questionInput);

        const submitBtn = document.createElement("button");
        submitBtn.type = "button";
        submitBtn.textContent = "提交";

        let emailInput = null;
        if (isManual) {
          submitBtn.className = "transfer-question-submit";
          el.appendChild(submitBtn);
        } else {
          const row = document.createElement("div");
          row.className = "email-capture";

          emailInput = document.createElement("input");
          emailInput.type = "email";
          emailInput.placeholder = "您的邮箱（选填，方便客服邮件回复您）";

          row.appendChild(emailInput);
          row.appendChild(submitBtn);
          el.appendChild(row);
        }

        const statusEl = document.createElement("div");
        statusEl.className = "email-capture-status";
        statusEl.style.display = "none";
        el.appendChild(statusEl);

        function showStatus(text) {
          statusEl.textContent = text;
          statusEl.style.display = "block";
          messages.scrollTop = messages.scrollHeight;
        }

        submitBtn.addEventListener("click", async () => {
          const question = questionInput.value.trim();
          if (!question) {
            showStatus("请输入您想咨询的问题");
            return;
          }
          const email = emailInput ? emailInput.value.trim() : "";
          if (email && !EMAIL_RE.test(email)) {
            showStatus("邮箱格式不正确，请检查后重试，或留空不填");
            return;
          }
          submitBtn.disabled = true;
          try {
            const res = await fetch(`/api/conversations/${conversationId}/transfer-question`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question, email: email || null }),
            });
            if (!res.ok) throw new Error();
            const data = await res.json().catch(() => ({}));
            questionInput.remove();
            if (emailInput) {
              emailInput.parentElement.remove();
            } else {
              submitBtn.remove();
            }
            statusEl.remove();

            // 客户填的问题单独成一条正常大小的消息保留下来，不再挤在上面那句
            // "好的，请您简单描述…"提示下面变成一行不起眼的小字。
            addMessage(question, "user");

            // 主动转人工时补充的这个问题，后端会跟正常提问一样过一遍"无关闲聊/低俗/违法/
            // 涉政等不当内容"判断——命中的话直接展示引导语，到此结束，不进入转人工等待状态、
            // 不展示邮箱气泡、不发邮件通知客服，整个转人工流程终止。
            if (data && data.irrelevant) {
              addMessage(data.answer || "这个问题好像和产品咨询没有太大关系呢。", "bot");
              return;
            }

            if (email) {
              addMessage(`📧 ${email}`, "user");
            }

            const followUp = addMessage("", "bot");
            if (email) {
              // 已经留了邮箱：马上确认已经把具体问题更新给客服（带上问题内容，不是一句
              // 不带内容的泛泛确认）；如果等满 10 秒仍未有客服回复，pollAnswer 会再补一条
              // "请耐心等待客服通过邮箱【xxx】回复您～"的提示，带上客户刚填的具体邮箱
              // （emailProvided=true，不会再弹一次输入邮箱的框，因为邮箱已经填过了）。
              setFinalText(followUp, `已将您的问题「${question}」更新给人工客服，请耐心等待客服回复您～`);
              pollAnswer(conversationId, followUp, false, mode, {
                question,
                emailProvided: true,
                email,
              }).catch(() => {});
            } else {
              // 没留邮箱：先确认已经把具体问题更新给客服；如果等太久（>10秒）客服仍未回复，
              // 会像常规流程一样在下面新增一条"人工客服正忙，留邮箱"的提示。
              setFinalText(followUp, `已将你的问题「${question}」更新给人工客服。`);
              pollAnswer(conversationId, followUp, false, mode, { question, emailProvided: false }).catch(() => {});
            }
          } catch (err) {
            submitBtn.disabled = false;
            showStatus("提交失败，请稍后重试");
          }
        });

        messages.scrollTop = messages.scrollHeight;
      }

      // ---------------- 产品选择：不同产品各自有独立题库，提问前先确定产品 ----------------

      const PRODUCT_KEY = "fuyunhon_product_id";
      let products = [];
      let currentProduct = null;

      function getSavedProduct() {
        return localStorage.getItem(PRODUCT_KEY);
      }

      function productLabel(id) {
        const meta = products.find((p) => p.id === id);
        return meta ? meta.label : id;
      }

      function renderPicker() {
        pickerOptions.innerHTML = products
          .map((p) => `<button type="button" class="picker-btn" data-id="${p.id}">${p.label}</button>`)
          .join("");
        pickerOptions.querySelectorAll(".picker-btn").forEach((btn) => {
          btn.addEventListener("click", () => selectProduct(btn.getAttribute("data-id")));
        });
      }

      function selectProduct(id, options) {
        const silent = options && options.silent;
        const isSwitch = !!currentProduct && currentProduct !== id;
        currentProduct = id;
        localStorage.setItem(PRODUCT_KEY, id);
        currentProductLabel.textContent = productLabel(id);
        productIndicator.style.display = "block";
        pickerOverlay.style.display = "none";
        if (isSwitch && !silent) {
          addMessage(`已切换到「${productLabel(id)}」，请描述您想咨询的问题～`, "bot");
        }
        input.focus();
      }

      async function initProducts() {
        try {
          const res = await fetch("/api/products");
          const data = await res.json();
          products = data.items || [];
        } catch (err) {
          products = [];
        }
        renderPicker();

        const saved = getSavedProduct();
        if (saved && products.some((p) => p.id === saved)) {
          selectProduct(saved, { silent: true });
        } else {
          pickerOverlay.style.display = "flex";
        }
      }

      switchProductLink.addEventListener("click", (event) => {
        event.preventDefault();
        pickerOverlay.style.display = "flex";
      });

      // 刷新页面时恢复聊天记录：sessionStorage 里已经有会话 id，说明这是"同一个标签页刷新"，
      // 不是全新打开的页面——这时才去后端把历史问答拉回来重新渲染成消息气泡；如果是全新标签页
      // （sessionStorage 还是空的），就不用调这个接口，直接从空白开始即可。注意这里直接读
      // sessionStorage，不调用 getSessionId()，避免"仅仅检查一下"就顺带创建了一个新会话 id。
      // 服务端存的 created_at 是 SQLite 生成的 UTC 时间、不带时区后缀（跟 agent.html 里
      // formatBeijingTime 解析的是同一种格式），这里按 UTC 解析后算出"已经过去多久"，
      // 单位毫秒；解析失败（字段缺失/格式异常）时保守返回 0，等同于"当作刚提问"处理。
      function elapsedMsSince(utcStr) {
        if (!utcStr) return 0;
        const date = new Date(`${utcStr.replace(" ", "T")}Z`);
        if (Number.isNaN(date.getTime())) return 0;
        return Math.max(0, Date.now() - date.getTime());
      }

      async function restoreHistory() {
        const existingSessionId = sessionStorage.getItem(SESSION_KEY);
        if (!existingSessionId) return;
        try {
          const res = await fetch(`/api/conversations/by-session/${encodeURIComponent(existingSessionId)}`);
          if (!res.ok) return;
          const data = await res.json();
          (data.items || []).forEach((item) => {
            addMessage(item.question, "user");
            // 客户当时如果留了邮箱（无论是主动转人工时一并填写的，还是"人工客服正忙"提示下
            // 补填的），实时聊天里会单独显示一条「📧 邮箱」的气泡；刷新恢复历史记录时如果漏了
            // 这一步，客户会发现自己填过的邮箱"凭空消失了"，看起来像是没有被记录下来。
            if (item.email) {
              addMessage(`📧 ${item.email}`, "user");
            }
            if (item.status === "answered") {
              addMessage(item.answer || "", "bot");
              return;
            }
            // 客户当时说了"转人工"之类，但还没来得及提交"具体想咨询的问题"这个补充表单
            // （question 字段目前还是"转人工"这句占位文本）：不能像普通未命中问题那样恢复出
            // 一句只会一直不变的"已收到您的问题…"，那样客户就永远没机会把真正想问的内容
            // 告诉客服了。这里要重新弹出同一个"请描述您的问题"输入框，让客户能继续把这个
            // 流程走完，跟第一次遇到时看到的一模一样。
            if (item.awaiting_transfer_details) {
              const bubble = addMessage("", "bot");
              renderTransferQuestionPrompt(bubble, item.id, item.mode_used === "manual", item.mode_used);
              return;
            }
            // 还没有最终回复的问题（客服/AI 还在处理）：恢复出等待中的提示文案，并接回轮询。
            // elapsedMs 按提问时间算出这条对话已经等了多久，传给 pollAnswer 后它会用"剩余
            // 时间"而不是重新数满 10 秒——不然客户明明已经等过、该看到的"人工客服正忙"提示
            // 却要刷新一次就"倒退"回等待状态，再重新等 10 秒才会出现，看起来像是卡住了。
            //
            // is_explicit_transfer=true 说明这条对话是客户主动说"转人工"、自己补充过具体问题
            // 后进入的等待状态（跟题库未命中被动转人工是两种不同的起点）：这时不能恢复出
            // "已收到您的问题，正在为您转接人工客服"这句——那是被动转人工的话术，跟客户主动
            // 补充问题时实际看到的"已将您的问题「XXX」更新给人工客服…"不一致，刷新后会像是
            // "换了一个界面"。这里按是否已经留了邮箱，还原出跟当时提交后一模一样的确认文案。
            const bubble = addMessage("", "bot");
            const initialText = item.is_explicit_transfer
              ? item.email
                ? `已将您的问题「${item.question}」更新给人工客服，请耐心等待客服回复您～`
                : `已将你的问题「${item.question}」更新给人工客服。`
              : item.matched
              ? "AI 正在思考您的问题，请稍候..."
              : "已收到您的问题，正在为您转接人工客服，请稍候";
            setThinkingText(bubble, initialText);
            pollAnswer(item.id, bubble, item.matched, item.mode_used, {
              question: item.question,
              emailProvided: item.has_email,
              email: item.email || "",
              elapsedMs: elapsedMsSince(item.created_at),
            }).catch(() => {});
          });
        } catch (err) {
          // 拉取历史失败时静默忽略，不影响客户继续正常提问
        }
      }

      initProducts();
      restoreHistory();

      async function ask(message) {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, session_id: getSessionId(), product: currentProduct }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "请求失败");
        }
        return data;
      }

      // 不设置"等太久就放弃"的极端兜底：AI 的反馈不会超过 10 秒这个量级（matched=true 时），
      // 涉及转人工的情况（matched=false）在 10 秒时已经直接进入"留邮箱/补充问题"的转人工机制，
      // 客户随时可以在那个入口留下联系方式，不需要再额外设一个"等 10 分钟后放弃"的兜底文案；
      // 这里持续轮询直到客服/AI 给出最终回复为止，客户不需要手动刷新页面。
      // options.question：客户具体问的内容，用于后续"已将您的问题「XXX」更新给人工客服…"这类
      // 确认文案里回显具体内容，而不是一句不带内容的泛泛确认。
      // options.emailProvided：客户是否已经在提交转人工问题的同时留了邮箱——留过了就不用再
      // 弹一次"留邮箱"的输入框，10 秒后只需要换成一条静态确认消息即可。
      // options.email：客户具体留的邮箱地址，用于 10 秒后的确认文案里回显"客服会通过这个
      // 邮箱回复您"，而不是一句不带具体邮箱的泛泛确认。
      // options.elapsedMs：这条对话已经等待了多久（刷新页面恢复历史记录时，按服务端记录的
      // 提问时间算出来，而不是固定传 0）——避免每次刷新都重新从 0 开始数 10 秒，导致客户明明
      // 已经等过、该出现的"人工客服正忙"提示却像是"倒退"了一样要重新等一遍才出现；真正是
      // 刚提问、还没等过的场景传 0（或不传）即可，跟之前的效果完全一样。
      async function pollAnswer(conversationId, loadingEl, matched, mode, options) {
        options = options || {};
        const question = options.question || "";
        const emailProvided = !!options.emailProvided;
        const email = options.email || "";
        const elapsedMs = Math.max(0, options.elapsedMs || 0);
        const remainingMs = Math.max(0, 10000 - elapsedMs);
        let answered = false;
        // 未命中题库、真正转人工时，"人工客服正忙"提示会作为新的一条消息追加在下面，
        // 不会覆盖掉前面"已收到您的问题，正在为您转接人工客服，请稍候"这条消息——
        // 两条都要保留在对话记录里，followUpEl 记录新增的那一条，方便最终答案写入。
        // 全人工模式没有这个提示（见下方 isManual 分支），但客服的最终回复同样要另起一条
        // 新消息，不能覆盖掉"已收到您的问题"这条——到真正拿到回复时才现场创建这条新消息。
        let followUpEl = null;

        // matched=true 说明题库已命中、AI 正在准备自动发送，这个等待过程从头到尾都跟"人工客服"无关，
        // 全程只应该出现"AI"相关的话术，绝不能出现"转人工/人工客服正忙"这类文案，避免误导客户。
        // 只有 matched=false（题库未命中，真正转人工）时，才会在等太久后提示客户就地留下邮箱；
        // 如果客户已经留了邮箱（emailProvided=true，来自主动转人工时一并填写的邮箱），则不需要
        // 再弹一次输入框，直接换成一条"已更新给人工客服"的静态确认即可。
        // 全人工模式完全不需要"留邮箱"这套机制——问题已经直接进了工作台待处理队列，客服本就
        // 要一直盯着处理，所以全人工模式下即使等了 10 秒也不弹任何提示，安静持续轮询即可。
        const isManual = mode === "manual";
        const busyTimer = isManual
          ? null
          : matched
          ? setTimeout(() => {
              if (!answered) {
                setFinalText(loadingEl, "AI 思考时间较长，请耐心等待");
              }
            }, remainingMs)
          : emailProvided
          ? setTimeout(() => {
              if (!answered) {
                // 用 addMessageAfter（不是 addMessage）插在 loadingEl 后面：刷新页面一次性
                // 恢复多条历史对话时，各自的计时器几乎同时触发，如果统一追加到聊天记录最
                // 末尾，这几条提示会跟自己所属的提问脱节、全部挤在最下面，次序看起来很乱。
                followUpEl = addMessageAfter(loadingEl, "", "bot");
                // 客户提交转人工时已经一并留了邮箱，前一条消息已经确认过"已将您的问题
                // 更新给人工客服"，这里不重复那句话，只说明客服正忙、已经邮件通知客服，
                // 并带上具体邮箱地址，让客户清楚知道客服会用哪个邮箱回复。
                const confirmText = email
                  ? `人工客服正忙，已邮件通知客服，请耐心等待客服通过邮箱【${email}】回复您～`
                  : "人工客服正忙，已通知客服，请耐心等待客服回复您～";
                setFinalText(followUpEl, confirmText);
              }
            }, remainingMs)
          : setTimeout(() => {
              if (!answered) {
                followUpEl = addMessageAfter(loadingEl, "", "bot");
                renderLeaveEmailPrompt(followUpEl, conversationId, question);
              }
            }, remainingMs);

        while (true) {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          try {
            const res = await fetch(`/api/conversations/${conversationId}`);
            const data = await res.json();
            if (data.status === "answered" && data.answer) {
              answered = true;
              clearTimeout(busyTimer);
              // 全人工模式没有 followUpEl（没有留邮箱这套弹窗），但同样不能把客服的回复
              // 直接写进"已收到您的问题，正在为您转接人工客服，请稍候"这条消息里——那句话
              // 也要保留成一条独立的记录，客服的回复另起一条新消息展示（插在 loadingEl
              // 后面，理由同上，避免多条历史对话同时轮询到结果时彼此的回复次序被打乱）。
              const targetEl = followUpEl || (isManual ? addMessageAfter(loadingEl, "", "bot") : loadingEl);
              setFinalText(targetEl, data.answer);
              return;
            }
          } catch (err) {
            // 网络抖动时静默重试
          }
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        if (!currentProduct) {
          pickerOverlay.style.display = "flex";
          return;
        }

        input.value = "";
        addMessage(text, "user");
        const loading = addMessage("", "bot");
        setThinkingText(loading, "AI 正在分析您的问题...");
        send.disabled = true;

        try {
          const data = await ask(text);
          if (data.status === "answered") {
            setFinalText(loading, data.answer);
          } else if (data.need_transfer_details) {
            // 客户直接说了"转人工"之类，明确要求转接真人：不用再演"AI 思考/等待"这段过程，
            // 直接请客户补充具体问题（全人工模式下不需要再选填邮箱）。这里先不轮询——客户还
            // 没提交真正想问的问题，提交之后才会在 renderTransferQuestionPrompt 里另起一条
            // 新消息并开始轮询，避免两边同时轮询同一个对话、互相抢着改同一条消息内容。
            renderTransferQuestionPrompt(loading, data.conversation_id, data.mode === "manual", data.mode);
          } else {
            // 人机协同模式下，若题库已命中（AI 已生成建议、进入自动发送倒计时），
            // 客户看到的应该是"AI 思考中"，不是"转人工"提示——只有未命中时才是真正转人工。
            setThinkingText(
              loading,
              data.matched ? "AI 正在思考您的问题，请稍候..." : "已收到您的问题，正在为您转接人工客服，请稍候"
            );
            // 同上，不 await，避免发送按钮被长时间轮询锁死。
            pollAnswer(data.conversation_id, loading, data.matched, data.mode, { question: text }).catch(() => {});
          }
        } catch (err) {
          setFinalText(loading, `出错了：${err.message}`);
        } finally {
          send.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });
    </script>
  </body>
</html>
