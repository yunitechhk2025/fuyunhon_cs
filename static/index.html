<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>澳洲肤润康 AI 客服</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        color: #172033;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      .page {
        /* 手机浏览器的地址栏/工具栏会动态伸缩，导致 100vh 计算不稳定，
           曾出现过页面被意外滚动、顶部标题被顶到可视区域外的问题（尤其点击输入框后）。
           用 position: fixed + inset: 0 把整个应用钉死在可视窗口内，不参与文档滚动，从根源上避免这个问题；
           不再额外指定 width/height，避免和 inset 的四个偏移量互相冲突。 */
        position: fixed;
        inset: 0;
        display: flex;
      }

      .chat {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #ffffff;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e8edf5;
        background: linear-gradient(135deg, #2f6fed, #25b8a8);
        color: #ffffff;
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
      }

      .header p {
        margin: 8px 0 0;
        opacity: 0.9;
        font-size: 14px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .message {
        max-width: 78%;
        margin-bottom: 16px;
        padding: 13px 15px;
        border-radius: 16px;
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 15px;
      }

      .bot {
        background: #f0f4fa;
        border-top-left-radius: 4px;
      }

      /* 等待结果时用几个跳动的小圆点表示"还在处理中"，比纯静态文字更直观。 */
      .typing-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 6px;
        vertical-align: middle;
      }

      .typing-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7a8aa8;
        opacity: 0.35;
        animation: typing-bounce 1.1s infinite ease-in-out;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes typing-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        30% {
          transform: translateY(-4px);
          opacity: 0.9;
        }
      }

      .user {
        margin-left: auto;
        background: #2f6fed;
        color: #ffffff;
        border-top-right-radius: 4px;
      }

      .composer {
        display: flex;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid #e8edf5;
        background: #ffffff;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 48px;
        max-height: 140px;
        border: 1px solid #d7dfec;
        border-radius: 14px;
        padding: 13px 14px;
        outline: none;
        font: inherit;
      }

      textarea:focus {
        border-color: #2f6fed;
      }

      button {
        width: 104px;
        border: 0;
        border-radius: 14px;
        background: #2f6fed;
        color: #ffffff;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .product-indicator {
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.95;
      }

      .product-indicator a {
        color: #ffffff;
        text-decoration: underline;
        cursor: pointer;
      }

      .picker-overlay {
        position: fixed;
        inset: 0;
        background: rgba(20, 30, 60, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }

      .picker-card {
        background: #ffffff;
        border-radius: 18px;
        max-width: 380px;
        width: 100%;
        padding: 28px 26px;
        box-shadow: 0 20px 60px rgba(20, 30, 60, 0.25);
        text-align: center;
      }

      .picker-card h2 {
        margin: 0 0 8px;
        font-size: 19px;
        color: #172033;
      }

      .picker-card p {
        margin: 0 0 20px;
        font-size: 13px;
        color: #6b7686;
      }

      .picker-options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .picker-btn {
        width: 100%;
        border: 1.5px solid #d7dfec;
        background: #f7f9fd;
        color: #172033;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: border-color 0.15s, background 0.15s;
      }

      .picker-btn:hover {
        border-color: #2f6fed;
        background: #eef4ff;
      }

      /* 手机窄屏适配：整体已是全屏聊天布局，这里只需收紧间距/字号，
         并把输入区改成"文本框在上、发送按钮独占一行"，避免小屏被挤变形。 */
      @media (max-width: 480px) {
        .header {
          padding: 14px 16px;
        }

        .header h1 {
          font-size: 18px;
        }

        .header p {
          font-size: 12.5px;
        }

        .product-indicator {
          font-size: 12px;
        }

        .messages {
          padding: 14px;
        }

        .message {
          max-width: 86%;
          font-size: 14px;
          padding: 11px 13px;
        }

        .composer {
          flex-wrap: wrap;
          padding: 10px 12px;
        }

        textarea {
          min-height: 42px;
          font-size: 14px;
          flex-basis: 100%;
        }

        button {
          width: 100%;
          padding: 10px 0;
        }

        .picker-card {
          padding: 20px 18px;
        }

        .picker-card h2 {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="chat">
        <header class="header">
          <h1>澳洲肤润康 AI 客服</h1>
          <p>智能匹配常见问题库，必要时将转接人工客服为您解答。</p>
          <p id="product-indicator" class="product-indicator" style="display: none">
            当前咨询：<span id="current-product-label"></span> · <a id="switch-product-link">切换产品</a>
          </p>
        </header>

        <div id="messages" class="messages">
          <div class="message bot">你好，我是澳洲肤润康 AI 客服。请先选择您要咨询的产品，我再根据对应题库为您解答。</div>
        </div>

        <form id="form" class="composer">
          <textarea id="input" placeholder="例如：孕妇能用吗？" rows="1"></textarea>
          <button id="send" type="submit">发送</button>
        </form>
      </section>
    </main>

    <div id="product-picker-overlay" class="picker-overlay">
      <div class="picker-card">
        <h2>请选择您想咨询的产品</h2>
        <p>选择后，我们会针对该产品的常见问题为您解答</p>
        <div id="picker-options" class="picker-options"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const messages = document.getElementById("messages");
      const pickerOverlay = document.getElementById("product-picker-overlay");
      const pickerOptions = document.getElementById("picker-options");
      const productIndicator = document.getElementById("product-indicator");
      const currentProductLabel = document.getElementById("current-product-label");
      const switchProductLink = document.getElementById("switch-product-link");

      const SESSION_KEY = "fuyunhon_session_id";
      function getSessionId() {
        let id = localStorage.getItem(SESSION_KEY);
        if (!id) {
          id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
          localStorage.setItem(SESSION_KEY, id);
        }
        return id;
      }

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `message ${role}`;
        el.textContent = text;
        messages.appendChild(el);
        messages.scrollTop = messages.scrollHeight;
        return el;
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str == null ? "" : str;
        return div.innerHTML;
      }

      const THINKING_DOTS_HTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';

      // 还在等结果（AI 思考中 / 排队转人工中）时用这个：文字 + 跳动的小圆点，让客户感觉到"还在处理"。
      function setThinkingText(el, text) {
        el.innerHTML = escapeHtml(text) + THINKING_DOTS_HTML;
        messages.scrollTop = messages.scrollHeight;
      }

      // 已经有确定结果（真正的回复，或彻底放弃等待）时用这个：纯文字，不再带动态点。
      function setFinalText(el, text) {
        el.textContent = text;
        messages.scrollTop = messages.scrollHeight;
      }

      // ---------------- 产品选择：不同产品各自有独立题库，提问前先确定产品 ----------------

      const PRODUCT_KEY = "fuyunhon_product_id";
      let products = [];
      let currentProduct = null;

      function getSavedProduct() {
        return localStorage.getItem(PRODUCT_KEY);
      }

      function productLabel(id) {
        const meta = products.find((p) => p.id === id);
        return meta ? meta.label : id;
      }

      function renderPicker() {
        pickerOptions.innerHTML = products
          .map((p) => `<button type="button" class="picker-btn" data-id="${p.id}">${p.label}</button>`)
          .join("");
        pickerOptions.querySelectorAll(".picker-btn").forEach((btn) => {
          btn.addEventListener("click", () => selectProduct(btn.getAttribute("data-id")));
        });
      }

      function selectProduct(id, options) {
        const silent = options && options.silent;
        const isSwitch = !!currentProduct && currentProduct !== id;
        currentProduct = id;
        localStorage.setItem(PRODUCT_KEY, id);
        currentProductLabel.textContent = productLabel(id);
        productIndicator.style.display = "block";
        pickerOverlay.style.display = "none";
        if (isSwitch && !silent) {
          addMessage(`已切换到「${productLabel(id)}」，请描述您想咨询的问题～`, "bot");
        }
        input.focus();
      }

      async function initProducts() {
        try {
          const res = await fetch("/api/products");
          const data = await res.json();
          products = data.items || [];
        } catch (err) {
          products = [];
        }
        renderPicker();

        const saved = getSavedProduct();
        if (saved && products.some((p) => p.id === saved)) {
          selectProduct(saved, { silent: true });
        } else {
          pickerOverlay.style.display = "flex";
        }
      }

      switchProductLink.addEventListener("click", (event) => {
        event.preventDefault();
        pickerOverlay.style.display = "flex";
      });

      initProducts();

      async function ask(message) {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, session_id: getSessionId(), product: currentProduct }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "请求失败");
        }
        return data;
      }

      async function pollAnswer(conversationId, loadingEl, matched) {
        const maxAttempts = 200; // 约 10 分钟（每 3 秒一次）
        let answered = false;

        // matched=true 说明题库已命中、AI 正在准备自动发送，这个等待过程从头到尾都跟"人工客服"无关，
        // 全程只应该出现"AI"相关的话术，绝不能出现"转人工/人工客服正忙"这类文案，避免误导客户。
        // 只有 matched=false（题库未命中，真正转人工）时，才会在等太久后提示"人工客服正忙"。
        // 提示切换后仍在继续轮询，所以还是带跳动点的"思考中"样式，不是最终结果。
        const busyTimer = matched
          ? setTimeout(() => {
              if (!answered) {
                setThinkingText(loadingEl, "AI 思考时间较长，请耐心等待");
              }
            }, 10000)
          : setTimeout(() => {
              if (!answered) {
                setThinkingText(loadingEl, "人工客服正忙，请您稍后查看回复，感谢您的耐心等待～");
              }
            }, 10000);

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          try {
            const res = await fetch(`/api/conversations/${conversationId}`);
            const data = await res.json();
            if (data.status === "answered" && data.answer) {
              answered = true;
              clearTimeout(busyTimer);
              setFinalText(loadingEl, data.answer);
              return;
            }
          } catch (err) {
            // 网络抖动时静默重试
          }
        }
        clearTimeout(busyTimer);
        setFinalText(
          loadingEl,
          matched
            ? "AI 暂时无法给出回复，请稍后重新提问，或联系人工客服协助处理。"
            : "客服暂时繁忙，请稍后重新提问或换个方式联系我们。"
        );
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        if (!currentProduct) {
          pickerOverlay.style.display = "flex";
          return;
        }

        input.value = "";
        addMessage(text, "user");
        const loading = addMessage("", "bot");
        setThinkingText(loading, "AI 正在分析您的问题...");
        send.disabled = true;

        try {
          const data = await ask(text);
          if (data.status === "answered") {
            setFinalText(loading, data.answer);
          } else {
            // 人机协同模式下，若题库已命中（AI 已生成建议、进入自动发送倒计时），
            // 客户看到的应该是"AI 思考中"，不是"转人工"提示——只有未命中时才是真正转人工。
            setThinkingText(
              loading,
              data.matched ? "AI 正在思考您的问题，请稍候..." : "已收到您的问题，正在为您转接人工客服，请稍候..."
            );
            await pollAnswer(data.conversation_id, loading, data.matched);
          }
        } catch (err) {
          setFinalText(loading, `出错了：${err.message}`);
        } finally {
          send.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });
    </script>
  </body>
</html>
