<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>澳洲肤润康 AI 客服</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        color: #172033;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      .page {
        /* 手机浏览器的地址栏/工具栏会动态伸缩，导致 100vh 计算不稳定，
           曾出现过页面被意外滚动、顶部标题被顶到可视区域外的问题（尤其点击输入框后）。
           用 position: fixed 把整个应用钉死在可视窗口内，不参与文档滚动，从根源上避免这个问题。
           iPhone（Safari/微信内置浏览器）弹出键盘时，只有"视觉视口"会缩小，用来定位 fixed 元素的
           "布局视口"并不会跟着变化——如果高度写死 100vh/inset:0，键盘弹出后整块应用还是按旧高度
           占位，导致输入框被顶到屏幕中间这种错位。改成用下面 JS 动态写入的 --app-height（等于
           window.visualViewport.height）来控制高度，键盘弹出/收起时会跟着实时调整，不再错位。 */
        position: fixed;
        top: var(--app-offset-top, 0px);
        left: 0;
        width: 100%;
        height: var(--app-height, 100vh);
        display: flex;
      }

      .chat {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #ffffff;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e8edf5;
        background: linear-gradient(135deg, #2f6fed, #25b8a8);
        color: #ffffff;
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
      }

      .header p {
        margin: 8px 0 0;
        opacity: 0.9;
        font-size: 14px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .message {
        /* width: fit-content 让气泡宽度跟着文字内容走，短消息就是短气泡；
           max-width 只用来限制长消息不要撑得太宽，两者配合才不会出现"文字很短、气泡却很宽"的丑样子。 */
        width: fit-content;
        max-width: 78%;
        margin-bottom: 16px;
        padding: 13px 15px;
        border-radius: 16px;
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 15px;
      }

      .bot {
        background: #f0f4fa;
        border-top-left-radius: 4px;
      }

      /* 等待结果时用几个跳动的小圆点表示"还在处理中"，比纯静态文字更直观。 */
      .typing-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 6px;
        vertical-align: middle;
      }

      .typing-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7a8aa8;
        opacity: 0.35;
        animation: typing-bounce 1.1s infinite ease-in-out;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes typing-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        30% {
          transform: translateY(-4px);
          opacity: 0.9;
        }
      }

      .user {
        margin-left: auto;
        background: #2f6fed;
        color: #ffffff;
        border-top-right-radius: 4px;
      }

      /* 未命中转人工等太久时，让客户就地留下邮箱，方便客服后续通过邮件回复；
         客户不填邮箱就不提交，不会触发任何邮件。 */
      .email-capture {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .email-capture input {
        flex: 1;
        min-width: 160px;
        border: 1px solid #d7dfec;
        border-radius: 10px;
        padding: 9px 10px;
        font: inherit;
        font-size: 14px;
        outline: none;
      }

      .email-capture input:focus {
        border-color: #2f6fed;
      }

      .email-capture button {
        width: auto;
        padding: 9px 16px;
        border-radius: 10px;
        font-size: 14px;
      }

      .email-capture-status {
        margin-top: 8px;
        font-size: 13px;
        color: #6b7686;
      }

      /* 客户主动说"转人工"后，需要客户补充说明具体想咨询的问题，跟留邮箱输入框共用同一套外观。 */
      .transfer-question-input {
        display: block;
        width: 100%;
        min-height: 60px;
        margin-top: 10px;
        border: 1px solid #d7dfec;
        border-radius: 10px;
        padding: 9px 10px;
        font: inherit;
        font-size: 14px;
        outline: none;
        resize: vertical;
        box-sizing: border-box;
      }

      .transfer-question-input:focus {
        border-color: #2f6fed;
      }

      .composer {
        display: flex;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid #e8edf5;
        background: #ffffff;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 48px;
        max-height: 140px;
        border: 1px solid #d7dfec;
        border-radius: 14px;
        padding: 13px 14px;
        outline: none;
        font: inherit;
      }

      textarea:focus {
        border-color: #2f6fed;
      }

      button {
        width: 104px;
        border: 0;
        border-radius: 14px;
        background: #2f6fed;
        color: #ffffff;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .product-indicator {
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.95;
      }

      .product-indicator a {
        color: #ffffff;
        text-decoration: underline;
        cursor: pointer;
      }

      .picker-overlay {
        position: fixed;
        inset: 0;
        background: rgba(20, 30, 60, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }

      .picker-card {
        background: #ffffff;
        border-radius: 18px;
        max-width: 380px;
        width: 100%;
        padding: 28px 26px;
        box-shadow: 0 20px 60px rgba(20, 30, 60, 0.25);
        text-align: center;
      }

      .picker-card h2 {
        margin: 0 0 8px;
        font-size: 19px;
        color: #172033;
      }

      .picker-card p {
        margin: 0 0 20px;
        font-size: 13px;
        color: #6b7686;
      }

      .picker-options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .picker-btn {
        width: 100%;
        border: 1.5px solid #d7dfec;
        background: #f7f9fd;
        color: #172033;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: border-color 0.15s, background 0.15s;
      }

      .picker-btn:hover {
        border-color: #2f6fed;
        background: #eef4ff;
      }

      /* 手机窄屏适配：整体已是全屏聊天布局，这里只需收紧间距/字号，
         并把输入区改成"文本框在上、发送按钮独占一行"，避免小屏被挤变形。 */
      @media (max-width: 480px) {
        .header {
          padding: 14px 16px;
        }

        .header h1 {
          font-size: 18px;
        }

        .header p {
          font-size: 12.5px;
        }

        .product-indicator {
          font-size: 12px;
        }

        .messages {
          padding: 14px;
        }

        .message {
          max-width: 86%;
          font-size: 14px;
          padding: 11px 13px;
        }

        .composer {
          flex-wrap: wrap;
          padding: 10px 12px;
        }

        textarea {
          min-height: 42px;
          font-size: 14px;
          flex-basis: 100%;
        }

        button {
          width: 100%;
          padding: 10px 0;
        }

        .picker-card {
          padding: 20px 18px;
        }

        .picker-card h2 {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="chat">
        <header class="header">
          <h1>澳洲肤润康 AI 客服</h1>
          <p id="product-indicator" class="product-indicator" style="display: none">
            当前咨询：<span id="current-product-label"></span> · <a id="switch-product-link">切换产品</a>
          </p>
        </header>

        <div id="messages" class="messages">
          <div class="message bot">你好，我是澳洲肤润康 AI 客服。请先选择您要咨询的产品，我再根据对应题库为您解答。</div>
        </div>

        <form id="form" class="composer">
          <textarea id="input" placeholder="例如：孕妇能用吗？" rows="1"></textarea>
          <button id="send" type="submit">发送</button>
        </form>
      </section>
    </main>

    <div id="product-picker-overlay" class="picker-overlay">
      <div class="picker-card">
        <h2>请选择您想咨询的产品</h2>
        <p>选择后，我们会针对该产品的常见问题为您解答</p>
        <div id="picker-options" class="picker-options"></div>
      </div>
    </div>

    <script>
      // ---------------- iOS 键盘弹出时的视口修正 ----------------
      // Safari/微信内置浏览器弹出键盘后，只有 visualViewport（视觉视口）会变矮，
      // .page 用来定位的布局视口不会变——所以要靠 visualViewport 的实时高度去改写
      // --app-height，键盘弹出/收起时 .page 才会跟着同步收缩/恢复，不再把输入框顶飞到屏幕中间。
      // 键盘弹出时，部分机型/浏览器（如微信内置浏览器）还会把"视觉视口"相对布局视口向下滚动一段
      // 距离（用来在键盘上方露出地址栏），这段偏移量要同步写进 --app-offset-top，否则固定定位的
      // .page 仍按布局视口原点定位，会被顶到可视区域外面。
      function syncAppViewport() {
        const vv = window.visualViewport;
        const height = vv ? vv.height : window.innerHeight;
        const offsetTop = vv ? vv.offsetTop : 0;
        document.documentElement.style.setProperty("--app-height", `${height}px`);
        document.documentElement.style.setProperty("--app-offset-top", `${offsetTop}px`);
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncAppViewport);
        window.visualViewport.addEventListener("scroll", syncAppViewport);
      } else {
        window.addEventListener("resize", syncAppViewport);
      }
      syncAppViewport();

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const messages = document.getElementById("messages");
      const pickerOverlay = document.getElementById("product-picker-overlay");
      const pickerOptions = document.getElementById("picker-options");
      const productIndicator = document.getElementById("product-indicator");
      const currentProductLabel = document.getElementById("current-product-label");
      const switchProductLink = document.getElementById("switch-product-link");

      // 留邮箱 / 补充问题这两个入口共用同一套邮箱格式校验，只有真实格式的邮箱才会被接受。
      const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      const SESSION_KEY = "fuyunhon_session_id";
      function getSessionId() {
        let id = localStorage.getItem(SESSION_KEY);
        if (!id) {
          id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
          localStorage.setItem(SESSION_KEY, id);
        }
        return id;
      }

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `message ${role}`;
        el.textContent = text;
        messages.appendChild(el);
        messages.scrollTop = messages.scrollHeight;
        return el;
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str == null ? "" : str;
        return div.innerHTML;
      }

      const THINKING_DOTS_HTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';

      // 跳动小圆点只用来代替文末的 "..."：有省略号才显示动效；文末是 ～/~ 或普通句号时不加圆点。
      function setThinkingText(el, text) {
        const raw = text == null ? "" : String(text);
        if (/(?:\.{3}|…)+$/.test(raw)) {
          const base = raw.replace(/(?:\.{3}|…)+$/, "");
          el.innerHTML = escapeHtml(base) + THINKING_DOTS_HTML;
        } else {
          el.textContent = raw;
        }
        messages.scrollTop = messages.scrollHeight;
      }

      // 已经有确定结果（真正的回复，或彻底放弃等待）时用这个：纯文字，不再带动态点。
      function setFinalText(el, text) {
        el.textContent = text;
        messages.scrollTop = messages.scrollHeight;
      }

      // 未命中转人工等太久（10 秒）时，就地给客户一个留邮箱的入口：填了才提交，
      // 不填就什么都不会发生，不会触发任何邮件通知。
      function renderLeaveEmailPrompt(el, conversationId) {
        el.innerHTML = "";

        const textEl = document.createElement("div");
        textEl.textContent = "人工客服正忙，留下你的電郵，客服稍後通過電郵回復您";
        el.appendChild(textEl);

        const row = document.createElement("div");
        row.className = "email-capture";

        const emailInput = document.createElement("input");
        emailInput.type = "email";
        emailInput.placeholder = "请输入您的邮箱";

        const submitBtn = document.createElement("button");
        submitBtn.type = "button";
        submitBtn.textContent = "提交";

        row.appendChild(emailInput);
        row.appendChild(submitBtn);
        el.appendChild(row);

        const statusEl = document.createElement("div");
        statusEl.className = "email-capture-status";
        statusEl.style.display = "none";
        el.appendChild(statusEl);

        function showStatus(text) {
          statusEl.textContent = text;
          statusEl.style.display = "block";
          messages.scrollTop = messages.scrollHeight;
        }

        submitBtn.addEventListener("click", async () => {
          const email = emailInput.value.trim();
          if (!EMAIL_RE.test(email)) {
            showStatus("请输入正确的邮箱地址");
            return;
          }
          submitBtn.disabled = true;
          try {
            const res = await fetch(`/api/conversations/${conversationId}/leave-email`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });
            if (!res.ok) throw new Error();
            row.remove();
            showStatus("已将您的问题更新给人工客服，请耐心等待客服通过邮件回复您～");
          } catch (err) {
            submitBtn.disabled = false;
            showStatus("提交失败，请稍后重试");
          }
        });

        messages.scrollTop = messages.scrollHeight;
      }

      // 客户直接说"转人工"之类明确要求转接真人："转人工"这几个字本身不是一句有实际内容的
      // 提问，客服光看这个不知道要处理什么，所以要请客户再描述一次具体想咨询的问题（必填）；
      // 邮箱选填，留下真实格式的邮箱后客服可以直接通过邮件回复，不填也不影响问题内容的更新。
      function renderTransferQuestionPrompt(el, conversationId) {
        el.innerHTML = "";

        const textEl = document.createElement("div");
        textEl.textContent = "好的，请您简单描述一下想咨询的具体问题，我们马上为您转接人工客服～";
        el.appendChild(textEl);

        const questionInput = document.createElement("textarea");
        questionInput.className = "transfer-question-input";
        questionInput.placeholder = "请输入您想咨询的问题";
        el.appendChild(questionInput);

        const row = document.createElement("div");
        row.className = "email-capture";

        const emailInput = document.createElement("input");
        emailInput.type = "email";
        emailInput.placeholder = "您的邮箱（选填，方便客服邮件回复您）";

        const submitBtn = document.createElement("button");
        submitBtn.type = "button";
        submitBtn.textContent = "提交";

        row.appendChild(emailInput);
        row.appendChild(submitBtn);
        el.appendChild(row);

        const statusEl = document.createElement("div");
        statusEl.className = "email-capture-status";
        statusEl.style.display = "none";
        el.appendChild(statusEl);

        function showStatus(text) {
          statusEl.textContent = text;
          statusEl.style.display = "block";
          messages.scrollTop = messages.scrollHeight;
        }

        submitBtn.addEventListener("click", async () => {
          const question = questionInput.value.trim();
          if (!question) {
            showStatus("请输入您想咨询的问题");
            return;
          }
          const email = emailInput.value.trim();
          if (email && !EMAIL_RE.test(email)) {
            showStatus("邮箱格式不正确，请检查后重试，或留空不填");
            return;
          }
          submitBtn.disabled = true;
          try {
            const res = await fetch(`/api/conversations/${conversationId}/transfer-question`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question, email: email || null }),
            });
            if (!res.ok) throw new Error();
            questionInput.remove();
            row.remove();
            showStatus("已将您的问题更新给人工客服，请耐心等待客服回复～");
          } catch (err) {
            submitBtn.disabled = false;
            showStatus("提交失败，请稍后重试");
          }
        });

        messages.scrollTop = messages.scrollHeight;
      }

      // ---------------- 产品选择：不同产品各自有独立题库，提问前先确定产品 ----------------

      const PRODUCT_KEY = "fuyunhon_product_id";
      let products = [];
      let currentProduct = null;

      function getSavedProduct() {
        return localStorage.getItem(PRODUCT_KEY);
      }

      function productLabel(id) {
        const meta = products.find((p) => p.id === id);
        return meta ? meta.label : id;
      }

      function renderPicker() {
        pickerOptions.innerHTML = products
          .map((p) => `<button type="button" class="picker-btn" data-id="${p.id}">${p.label}</button>`)
          .join("");
        pickerOptions.querySelectorAll(".picker-btn").forEach((btn) => {
          btn.addEventListener("click", () => selectProduct(btn.getAttribute("data-id")));
        });
      }

      function selectProduct(id, options) {
        const silent = options && options.silent;
        const isSwitch = !!currentProduct && currentProduct !== id;
        currentProduct = id;
        localStorage.setItem(PRODUCT_KEY, id);
        currentProductLabel.textContent = productLabel(id);
        productIndicator.style.display = "block";
        pickerOverlay.style.display = "none";
        if (isSwitch && !silent) {
          addMessage(`已切换到「${productLabel(id)}」，请描述您想咨询的问题～`, "bot");
        }
        input.focus();
      }

      async function initProducts() {
        try {
          const res = await fetch("/api/products");
          const data = await res.json();
          products = data.items || [];
        } catch (err) {
          products = [];
        }
        renderPicker();

        const saved = getSavedProduct();
        if (saved && products.some((p) => p.id === saved)) {
          selectProduct(saved, { silent: true });
        } else {
          pickerOverlay.style.display = "flex";
        }
      }

      switchProductLink.addEventListener("click", (event) => {
        event.preventDefault();
        pickerOverlay.style.display = "flex";
      });

      initProducts();

      async function ask(message) {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, session_id: getSessionId(), product: currentProduct }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "请求失败");
        }
        return data;
      }

      async function pollAnswer(conversationId, loadingEl, matched, skipBusyTimer) {
        const maxAttempts = 200; // 约 10 分钟（每 3 秒一次）
        let answered = false;

        // matched=true 说明题库已命中、AI 正在准备自动发送，这个等待过程从头到尾都跟"人工客服"无关，
        // 全程只应该出现"AI"相关的话术，绝不能出现"转人工/人工客服正忙"这类文案，避免误导客户。
        // 只有 matched=false（题库未命中，真正转人工）时，才会在等太久后提示客户就地留下邮箱。
        // skipBusyTimer=true：客户已经明确要求转人工、留邮箱入口已经立即展示过了，不需要再等 10 秒
        // 后重复渲染一次（避免打断客户正在填写的邮箱输入框）。
        const busyTimer = skipBusyTimer
          ? null
          : matched
          ? setTimeout(() => {
              if (!answered) {
                setFinalText(loadingEl, "AI 思考时间较长，请耐心等待");
              }
            }, 10000)
          : setTimeout(() => {
              if (!answered) {
                renderLeaveEmailPrompt(loadingEl, conversationId);
              }
            }, 10000);

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          try {
            const res = await fetch(`/api/conversations/${conversationId}`);
            const data = await res.json();
            if (data.status === "answered" && data.answer) {
              answered = true;
              clearTimeout(busyTimer);
              setFinalText(loadingEl, data.answer);
              return;
            }
          } catch (err) {
            // 网络抖动时静默重试
          }
        }
        clearTimeout(busyTimer);
        if (matched) {
          setFinalText(loadingEl, "AI 暂时无法给出回复，请稍后重新提问，或联系人工客服协助处理。");
        } else if (!loadingEl.querySelector(".email-capture")) {
          // 未命中场景下，若客户还没提交邮箱，留邮箱的入口继续保留，方便客户随时填写；
          // 只有客户已经提交过（邮箱输入框已被移除）才会走到这里，用纯文字收尾。
          setFinalText(loadingEl, "客服暂时繁忙，请稍后重新提问或换个方式联系我们。");
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        if (!currentProduct) {
          pickerOverlay.style.display = "flex";
          return;
        }

        input.value = "";
        addMessage(text, "user");
        const loading = addMessage("", "bot");
        setThinkingText(loading, "AI 正在分析您的问题...");
        send.disabled = true;

        try {
          const data = await ask(text);
          if (data.status === "answered") {
            setFinalText(loading, data.answer);
          } else if (data.need_transfer_details) {
            // 客户直接说了"转人工"之类，明确要求转接真人：不用再演"AI 思考/等待"这段过程，
            // 直接请客户补充具体问题 + 选填邮箱，同时仍在后台继续轮询，方便客服在工作台
            // 实时回复时也能收到。
            renderTransferQuestionPrompt(loading, data.conversation_id);
            await pollAnswer(data.conversation_id, loading, false, true);
          } else {
            // 人机协同模式下，若题库已命中（AI 已生成建议、进入自动发送倒计时），
            // 客户看到的应该是"AI 思考中"，不是"转人工"提示——只有未命中时才是真正转人工。
            setThinkingText(
              loading,
              data.matched ? "AI 正在思考您的问题，请稍候..." : "已收到您的问题，正在为您转接人工客服，请稍候"
            );
            await pollAnswer(data.conversation_id, loading, data.matched);
          }
        } catch (err) {
          setFinalText(loading, `出错了：${err.message}`);
        } finally {
          send.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });
    </script>
  </body>
</html>
