<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>澳洲肤润康 AI 客服</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        color: #172033;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      .page {
        width: 100vw;
        height: 100vh;
        display: flex;
      }

      .chat {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #ffffff;
      }

      /* 大屏幕（浏览器全屏/放大到桌面宽度）下，聊天框不要被拉得又宽又扁，
         居中显示一个高度受限、比例正常的对话框，更接近客服小窗口的效果。 */
      @media (min-width: 640px) {
        html,
        body {
          overflow: auto;
        }

        .page {
          height: 100vh;
          min-height: 100vh;
          align-items: center;
          justify-content: center;
          background: #eef2f8;
          padding: 24px;
        }

        .chat {
          width: 100%;
          max-width: 480px;
          height: min(720px, 100%);
          border-radius: 20px;
          box-shadow: 0 20px 60px rgba(20, 30, 60, 0.18);
        }
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e8edf5;
        background: linear-gradient(135deg, #2f6fed, #25b8a8);
        color: #ffffff;
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
      }

      .header p {
        margin: 8px 0 0;
        opacity: 0.9;
        font-size: 14px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .message {
        max-width: min(60%, 460px);
        margin-bottom: 14px;
        padding: 10px 13px;
        border-radius: 14px;
        white-space: pre-wrap;
        line-height: 1.55;
        font-size: 14px;
      }

      .bot {
        background: #f0f4fa;
        border-top-left-radius: 4px;
      }

      .user {
        margin-left: auto;
        background: #2f6fed;
        color: #ffffff;
        border-top-right-radius: 4px;
      }

      .composer {
        display: flex;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid #e8edf5;
        background: #ffffff;
      }

      textarea {
        flex: 1;
        resize: none;
        min-height: 48px;
        max-height: 140px;
        border: 1px solid #d7dfec;
        border-radius: 14px;
        padding: 13px 14px;
        outline: none;
        font: inherit;
      }

      textarea:focus {
        border-color: #2f6fed;
      }

      button {
        width: 104px;
        border: 0;
        border-radius: 14px;
        background: #2f6fed;
        color: #ffffff;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .product-indicator {
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.95;
      }

      .product-indicator a {
        color: #ffffff;
        text-decoration: underline;
        cursor: pointer;
      }

      .picker-overlay {
        position: fixed;
        inset: 0;
        background: rgba(20, 30, 60, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }

      .picker-card {
        background: #ffffff;
        border-radius: 18px;
        max-width: 380px;
        width: 100%;
        padding: 28px 26px;
        box-shadow: 0 20px 60px rgba(20, 30, 60, 0.25);
        text-align: center;
      }

      .picker-card h2 {
        margin: 0 0 8px;
        font-size: 19px;
        color: #172033;
      }

      .picker-card p {
        margin: 0 0 20px;
        font-size: 13px;
        color: #6b7686;
      }

      .picker-options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .picker-btn {
        width: 100%;
        border: 1.5px solid #d7dfec;
        background: #f7f9fd;
        color: #172033;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: border-color 0.15s, background 0.15s;
      }

      .picker-btn:hover {
        border-color: #2f6fed;
        background: #eef4ff;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="chat">
        <header class="header">
          <h1>澳洲肤润康 AI 客服</h1>
          <p>智能匹配常见问题库，必要时将转接人工客服为您解答。</p>
          <p id="product-indicator" class="product-indicator" style="display: none">
            当前咨询：<span id="current-product-label"></span> · <a id="switch-product-link">切换产品</a>
          </p>
        </header>

        <div id="messages" class="messages">
          <div class="message bot">你好，我是澳洲肤润康 AI 客服。请先选择您要咨询的产品，我再根据对应题库为您解答。</div>
        </div>

        <form id="form" class="composer">
          <textarea id="input" placeholder="例如：孕妇能用吗？" rows="1"></textarea>
          <button id="send" type="submit">发送</button>
        </form>
      </section>
    </main>

    <div id="product-picker-overlay" class="picker-overlay">
      <div class="picker-card">
        <h2>请选择您想咨询的产品</h2>
        <p>选择后，我们会针对该产品的常见问题为您解答</p>
        <div id="picker-options" class="picker-options"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const messages = document.getElementById("messages");
      const pickerOverlay = document.getElementById("product-picker-overlay");
      const pickerOptions = document.getElementById("picker-options");
      const productIndicator = document.getElementById("product-indicator");
      const currentProductLabel = document.getElementById("current-product-label");
      const switchProductLink = document.getElementById("switch-product-link");

      const SESSION_KEY = "fuyunhon_session_id";
      function getSessionId() {
        let id = localStorage.getItem(SESSION_KEY);
        if (!id) {
          id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
          localStorage.setItem(SESSION_KEY, id);
        }
        return id;
      }

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `message ${role}`;
        el.textContent = text;
        messages.appendChild(el);
        messages.scrollTop = messages.scrollHeight;
        return el;
      }

      // ---------------- 产品选择：不同产品各自有独立题库，提问前先确定产品 ----------------

      const PRODUCT_KEY = "fuyunhon_product_id";
      let products = [];
      let currentProduct = null;

      function getSavedProduct() {
        return localStorage.getItem(PRODUCT_KEY);
      }

      function productLabel(id) {
        const meta = products.find((p) => p.id === id);
        return meta ? meta.label : id;
      }

      function renderPicker() {
        pickerOptions.innerHTML = products
          .map((p) => `<button type="button" class="picker-btn" data-id="${p.id}">${p.label}</button>`)
          .join("");
        pickerOptions.querySelectorAll(".picker-btn").forEach((btn) => {
          btn.addEventListener("click", () => selectProduct(btn.getAttribute("data-id")));
        });
      }

      function selectProduct(id, options) {
        const silent = options && options.silent;
        const isSwitch = !!currentProduct && currentProduct !== id;
        currentProduct = id;
        localStorage.setItem(PRODUCT_KEY, id);
        currentProductLabel.textContent = productLabel(id);
        productIndicator.style.display = "block";
        pickerOverlay.style.display = "none";
        if (isSwitch && !silent) {
          addMessage(`已切换到「${productLabel(id)}」，请描述您想咨询的问题～`, "bot");
        }
        input.focus();
      }

      async function initProducts() {
        try {
          const res = await fetch("/api/products");
          const data = await res.json();
          products = data.items || [];
        } catch (err) {
          products = [];
        }
        renderPicker();

        const saved = getSavedProduct();
        if (saved && products.some((p) => p.id === saved)) {
          selectProduct(saved, { silent: true });
        } else {
          pickerOverlay.style.display = "flex";
        }
      }

      switchProductLink.addEventListener("click", (event) => {
        event.preventDefault();
        pickerOverlay.style.display = "flex";
      });

      initProducts();

      async function ask(message) {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, session_id: getSessionId(), product: currentProduct }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "请求失败");
        }
        return data;
      }

      async function pollAnswer(conversationId, loadingEl) {
        const maxAttempts = 200; // 约 10 分钟（每 3 秒一次）
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          try {
            const res = await fetch(`/api/conversations/${conversationId}`);
            const data = await res.json();
            if (data.status === "answered" && data.answer) {
              loadingEl.textContent = data.answer;
              return;
            }
          } catch (err) {
            // 网络抖动时静默重试
          }
        }
        loadingEl.textContent = "客服暂时繁忙，请稍后重新提问或换个方式联系我们。";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        if (!currentProduct) {
          pickerOverlay.style.display = "flex";
          return;
        }

        input.value = "";
        addMessage(text, "user");
        const loading = addMessage("AI 正在分析您的问题...", "bot");
        send.disabled = true;

        try {
          const data = await ask(text);
          if (data.status === "answered") {
            loading.textContent = data.answer;
          } else {
            loading.textContent = "已收到您的问题，正在为您转接人工客服，请稍候...";
            await pollAnswer(data.conversation_id, loading);
          }
        } catch (err) {
          loading.textContent = `出错了：${err.message}`;
        } finally {
          send.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });
    </script>
  </body>
</html>
